services:
  acmesh:
    container_name: acmesh
    image: neilpang/acme.sh
    restart: always
    environment:
      - Tencent_SecretId=${Tencent_SecretId}
      - Tencent_SecretKey=${Tencent_SecretKey}
    volumes:
      - ./out:/acme.sh
    stdin_open: true
    tty: true
    network_mode: host
    command: daemon
