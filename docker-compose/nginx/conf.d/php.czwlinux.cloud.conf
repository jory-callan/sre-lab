server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name php.czwlinux.cloud;
    root /html/php.czwlinux.cloud/public;
    index index.html index.htm index.php;
    error_page 500 502 503 504 /50x.html;

    include conf.d/00-security.config;
    include conf.d/00-cors.config;
    # SSL
    include conf.d/00-ssl.config;

    location = /favicon.ico {
        return 204;
        access_log     off;
        log_not_found  off;
    }

    location = /50x.html {
        root    html;
    }

    location / {
        if (!-e $request_filename){
            rewrite  ^(.*)$  /index.php?s=$1  last;   break;
        }
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|flv|mp4|ico)$ {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, token, platform';
        expires 30d;
        access_log off;
    }

    location ~ .+\.php($|/) {
        alias   /data0/htdocs/php.czwlinux.cloud/public;
        include conf.d/00-cors.config;
        set $script    $uri;
        set $path_info  "/";
        if ($uri ~ "^(.+\.php)(/.+)") {
                set $script     $1;
                set $path_info  $2;
        }
        # fastcgi_pass fpm8.2.28:9000;  # change the fpm version for your application
        fastcgi_index  index.php?IF_REWRITE=1;
        include fastcgi_params;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param SCRIPT_FILENAME  $document_root$script;
        fastcgi_param SCRIPT_NAME $script;
    }
    
    access_log  /var/log/nginx/php.czwlinux.cloud_access.log  main;
    error_log /var/log/nginx/php.czwlinux.cloud_error.log error;
}
