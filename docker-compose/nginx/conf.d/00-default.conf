# 默认HTTP服务器 - 拒绝所有请求
server {
    listen 80 default_server; # 监听IPv4的80端口，设置为默认服务器
    listen [::]:80 default_server; # 监听IPv6的80端口，设置为默认服务器

    # 隐藏版本信息
    server_tokens off;

    # 静默关闭连接
    return 444;

    # 将所有HTTP请求永久重定向到HTTPS
    # $host: 请求的主机名
    # $request_uri: 请求的完整URI（包含查询参数）
    # return 301 https://$host$request_uri;
}

# 默认HTTPS服务器 - 拒绝所有请求
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _; # 匹配所有域名（默认服务器）
    
    # SSL证书路径
    # from 1.15.9+ , nginx support auto reload cert files
    ssl_certificate ssl/default.crt;
    ssl_certificate_key ssl/default.key;
    # 安全优化建议添加：
    # SSL协议版本（禁用不安全的版本）
    ssl_protocols TLSv1.2 TLSv1.3;
    # SSL加密套件
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    # 启用SSL会话缓存
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    
    return 444;
}