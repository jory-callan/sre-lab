server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name php.demo.czwlinux.cloud;
    root /data0/htdocs/demo.php.czwlinux.co/public;
    index index.html index.htm index.php;
    error_page 500 502 503 504 /50x.html;

    # SSL
    http2 on;
    ssl_certificate ssl/php.demo.czwlinux.cloud.pem; 
    ssl_certificate_key ssl/php.demo.czwlinux.cloud.key; 

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    
    ssl_dhparam ssl/dhparam.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location = /favicon.ico {
        return 204;
        access_log     off;
        log_not_found  off;
    }

    location = /50x.html {
        root    html;
    }

    location ^~ /socket.io {        
        proxy_redirect off;
        proxy_pass http://fpm7.4.33-task:2121/socket.io/;      # 转发
        proxy_set_header Host $host;
        proxy_set_header X-Real_IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr:$remote_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;   # 升级协议头
        proxy_set_header Connection upgrade;
    }

    location / {
    #   add_header Access-Control-Allow-Origin *;
    #   add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
    #   add_header Access-Control-Allow-Headers 'Origin, Content-Type, X-Auth-Token, Authorization, X-Requested-With';
    #   add_header Access-Control-Max-Age 3600;
    #   if ($request_method = 'OPTIONS') {
    #           return 204;
    #   }

        if (!-e $request_filename){
            rewrite  ^(.*)$  /index.php?s=$1  last;   break;
        }
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|flv|mp4|ico)$ {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, token, platform';
        expires 30d;
        access_log off;
    }

    location ~ .+\.php($|/) {
        alias   /data0/htdocs/php.demo.czwlinux.cloud/public;
        include conf.d/00-cors.conf;
        set $script    $uri;
        set $path_info  "/";
        if ($uri ~ "^(.+\.php)(/.+)") {
                set $script     $1;
                set $path_info  $2;
        }
        fastcgi_pass fpm7.4.33:9000;
        fastcgi_index  index.php?IF_REWRITE=1;
        include fastcgi_params;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param SCRIPT_FILENAME  $document_root$script;
        fastcgi_param SCRIPT_NAME $script;
    }
    
    access_log  /var/log/nginx/php.demo.czwlinux.cloud_access.log  main;
    error_log /var/log/nginx/php.demo.czwlinux.cloud_error.log error;
}
