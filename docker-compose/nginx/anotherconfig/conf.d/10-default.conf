# 默认HTTP服务器 - 拒绝所有请求
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    # 隐藏版本信息
    server_tokens off;
    
    # 静默关闭连接
    return 444;
}

# 默认HTTPS服务器 - 拒绝所有请求
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    
    # 拒绝SSL握手
    ssl_reject_handshake on;
    
    # 隐藏版本信息
    server_tokens off;
    
    return 444;
}