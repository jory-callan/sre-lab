services:
  nginx:
    image: nginx:1.28.0
    restart: "always"
    environment:
      TZ: 'Asia/Shanghai'
    networks:
      - env-dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf  # 配置文件
      - ./conf.d/:/etc/nginx/conf.d/  # 配置文件
      - ./ssl/:/etc/nginx/ssl/  # SSL文件
      - ./html/:/html/ #程序目录
      - ./logs/:/var/log/nginx/ #日志
    # healthcheck:
    #   test: "curl -f http://localhost:443/api/health/"
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 60s

networks:
  env-dev:
    external: true
