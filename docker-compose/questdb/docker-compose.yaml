services:
  questdb:
    image: questdb/questdb:9.4.0
    container_name: questdb
    environment:
      - TZ=Asia/Shanghai
      # 关闭遥测
      - QDB_TELEMETRY_ENABLED=false
      # PostgreSQL 认证 (建议在生产环境中配置)
      - QDB_PG_ENABLED=true
      - QDB_PG_USER=admin
      - QDB_PG_PASSWORD=questdb
      # HTTP 认证 (Basic Auth, 仅对 API 有效)
      - QDB_HTTP_ENABLED=true
      - QDB_HTTP_USER=admin
      - QDB_HTTP_PASSWORD=questdb
      - QDB_HTTP_SECURITY_READONLY=true
      # 自定义 JVM 启动参数
      # - JVM_PREPEND=-XX:MaxRAMPercentage=75.0 -XX:InitRAMPercentage=50.0 -XX:+AlwaysPreTouch -XX:MaxDirectMemorySize=2g -XX:+UnlockExperimentalVMOptions -XX:+UseTransparentHugePages -XX:+UseG1GC
    volumes:
      - ./data:/var/lib/questdb
    ports:
      - "8812:8812" # PostgreSQL 线路协议端口 (用于 SQL 查询和第三方工具连接)
      - "9000:9000" # HTTP API 端口
      - "9003:9003" # InfluxDB 行协议端口 (用于写入)
      - "9009:9009" # MinHealth 检查端口 (Consul 等服务发现使用)
    networks:
      - env-dev
    # --- 资源限制 (生产环境必须配置) ---
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    # --- 共享内存 ---
    # QuestDB 性能极其依赖共享内存。
    # 在 Linux 宿主机上，需要确保 /proc/sys/kernel/shmmi 足够大 (至少等于 deploy.resources.limits.memory)
    shm_size: '2gb' # 这里的 shm_size 对 QuestDB 内部索引很重要
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1

networks:
  env-dev:
    external: true

# 注意：在生产环境中，建议通过 sysctl 配置而不是 Docker 直接设置。
# 提高系统最大文件句柄数
# sysctl -w fs.file-max=1048576
# 提高最大内存映射区域数 (QuestDB 非常依赖这个参数)
# sysctl -w vm.max_map_count=1048576
cat >> /etc/sysctl.conf <<EOF
# 提高系统最大文件句柄数 (默认值为 65536) QuestDB 建议设置为 1048576
fs.file-max = 1048576
# 提高最大内存映射区域数 (QuestDB 非常依赖这个参数)
vm.max_map_count = 1048576
EOF
# 应用新配置
sysctl -p