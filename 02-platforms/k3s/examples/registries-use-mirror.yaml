# k3s 容器镜像源配置
# 此文件会被复制到 /etc/rancher/k3s/registries.yaml
# 修改后需要重启 k3s 生效: systemctl restart k3s

mirrors:
  # Docker Hub 镜像源
  docker.io:
    endpoint:
      - "https://docker.m.daocloud.io"
      - "https://hub.atomgit.com"
      - "https://docker.1panel.live"
      - "https://docker.1ms.run"

  # Google Container Registry 镜像源
  gcr.io:
    endpoint:
      - "gcr.nju.edu.cn"
      - "m.daocloud.io/gcr.io"

  # GitHub Container Registry 镜像源
  ghcr.io:
    endpoint:
      - "ghcr.nju.edu.cn"
      - "m.daocloud.io/ghcr.io"

  # Kubernetes GCR 镜像源（旧版）
  k8s.gcr.io:
    endpoint:
      - "gcr.nju.edu.cn"
      - "m.daocloud.io/k8s.gcr.io"
      - "registry.cn-hangzhou.aliyuncs.com"

  # Kubernetes Registry 镜像源（新版）
  registry.k8s.io:
    endpoint:
      - "k8s.nju.edu.cn"

  # 私有镜像仓库示例（取消注释使用）
  # "192.168.1.100:5000":
  #   endpoint:
  #     - "http://192.168.1.100:5000"

config:
  # Docker Hub TLS 配置
  docker.io:
    tls:
      insecure_skip_verify: true

  # 私有仓库 TLS 配置示例
  # "192.168.1.100:5000":
  #   tls:
  #     insecure_skip_verify: true

# ==============================================
# 说明
# ==============================================
#
# mirrors: 定义镜像仓库的镜像地址
#   - 当拉取 docker.io/xxx 镜像时，会按顺序尝试 endpoint 中的地址
#   - 第一个成功的地址会被使用
#
# config: 定义特定仓库的 TLS、认证等配置
#   - insecure_skip_verify: 跳过 TLS 证书验证（用于自签名证书）
#
# 验证配置是否生效：
#   1. 重启 k3s: systemctl restart k3s
#   2. 查看 containerd 配置: cat /var/lib/rancher/k3s/agent/etc/containerd/config.toml
#   3. 测试拉取: crictl pull docker.io/library/nginx:alpine
#
# 常用镜像源参考：
#   - DaoCloud: https://github.com/DaoCloud/public-image-mirror
#   - 南京大学: https://doc.nju.edu.cn/books/e1654/page/gcr
#   - 阿里云: https://help.aliyun.com/document_detail/60750.html
