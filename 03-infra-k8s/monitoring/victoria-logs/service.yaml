# VictoriaLogs Service
# 集群内部署，Fluent Bit 通过此 Service 发送日志
apiVersion: v1
kind: Service
metadata:
  name: victoria-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: victoria-logs
    app.kubernetes.io/component: logs-storage
spec:
  selector:
    app.kubernetes.io/name: victoria-logs
  ports:
    - name: http
      port: 9428
      targetPort: http
      protocol: TCP
  type: ClusterIP
