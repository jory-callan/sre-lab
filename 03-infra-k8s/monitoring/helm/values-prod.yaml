# =============================================================================
# kube-prometheus-stack 自定义 values - 适配 k3s 集群环境
# =============================================================================
# 部署内容：Prometheus Operator + Prometheus + Grafana + AlertManager +
#           Node Exporter + kube-state-metrics + 默认告警规则 + 仪表板
# =============================================================================

# 全局配置
global:
  rbac:
    create: true

# =============================================================================
# 命名空间
# =============================================================================
namespaceOverride: "monitoring"

# =============================================================================
# 默认告警规则 - 保持开启，但根据小集群环境调整阈值
# =============================================================================
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sContainerMemoryWorkingSetBytes: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
    windows: false  # 没有 Windows 节点

# =============================================================================
# AlertManager - 使用默认配置，不持久化
# =============================================================================
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers: ['severity = critical']
        target_matchers: ['severity =~ warning|info']
        equal: ['namespace', 'alertname']
      - source_matchers: ['severity = warning']
        target_matchers: ['severity = info']
        equal: ['namespace', 'alertname']
      - source_matchers: ['alertname = InfoInhibitor']
        target_matchers: ['severity = info']
        equal: ['namespace']
    route:
      group_by: ['namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
      routes:
        - receiver: 'null'
          matchers: ['alertname = "Watchdog"']
    receivers:
      - name: 'null'
    templates:
      - '/etc/alertmanager/config/*.tmpl'
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 256Mi

# =============================================================================
# Grafana - 开启持久化、Ingress、NodePort
# =============================================================================
grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin123  # ⚠️ 首次部署后请修改密码

  # 默认仪表板
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Asia/Shanghai
  defaultDashboardsInterval: 30s

  # 持久化 - Grafana 数据（用户配置、仪表板修改等）
  persistence:
    enabled: true
    type: pvc
    storageClassName: nfs-storage
    accessModes: [ReadWriteOnce]
    size: 5Gi

  # 安全上下文 - 使用 PVC 已有 uid/gid，跳过 init chown
  initChownData:
    enabled: false

  # grafana.ini 覆盖 - 允许加载未签名插件
  grafana.ini:
    plugins:
      allow_loading_unsigned_plugins: victoriametrics-logs-datasource

  # Ingress - 通过域名访问
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - monitor.czw-sre.internal
    path: /
    pathType: Prefix

  # Service - NodePort 直连
  service:
    type: NodePort
    port: 80
    targetPort: 3000
    nodePort: 30101

  # 资源限制
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # 插件 - 已手动安装到 PVC，自动安装依赖网络可能不可用
  # plugins:
  #   - victoriametrics-logs-datasource

  # 节点调度 - 强制调度到 k3s-server-3（预缓存了 grafana+sidecar 镜像）
  nodeSelector:
    kubernetes.io/hostname: k3s-server-3

  # 通过 sidecar 自动发现仪表板和 datasource
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      isDefaultDatasource: true

# =============================================================================
# Prometheus - 持久化、资源限制、调整保留时间
# =============================================================================
prometheus:
  enabled: true

  # Service 配置 - 保持 ClusterIP（通过 Grafana 访问）
  service:
    type: ClusterIP
    port: 9090

  prometheusSpec:
    # 数据保留时间 - 小集群 7 天足够
    retention: 7d

    # 启动超时（CRD 要求 >= 60，0 会校验失败）
    maximumStartupDurationSeconds: 300

    # 日志级别
    logLevel: info

    # 副本数 - 单副本（3 节点小集群）
    replicas: 1

    # 存储 - 10Gi PVC
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-storage
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 10Gi

    # 资源限制
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

# =============================================================================
# Prometheus Operator - 管理 operator 自身资源
# =============================================================================
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      cpu: 200m
      memory: 256Mi

# =============================================================================
# kube-state-metrics - 集群对象状态指标
# =============================================================================
kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 100m
      memory: 128Mi

# =============================================================================
# Node Exporter - 节点指标采集
# =============================================================================
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 30Mi
    limits:
      cpu: 100m
      memory: 64Mi
