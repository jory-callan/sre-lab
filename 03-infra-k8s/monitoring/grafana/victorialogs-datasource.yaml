# VictoriaLogs Grafana 数据源
# 通过 Grafana sidecar 自动注册，无需手动配置
# 依赖 Grafana 已安装 victoriametrics-logs-datasource 插件
apiVersion: v1
kind: ConfigMap
metadata:
  name: victoria-logs-datasource
  namespace: monitoring
  labels:
    # Grafana sidecar 自动发现标签
    # kube-prometheus-stack Grafana 的 sidecar.datasources 默认使用此 label
    grafana_datasource: "1"
data:
  victoria-logs-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victoria-logs.monitoring.svc.cluster.local:9428
        isDefault: false
        editable: false
