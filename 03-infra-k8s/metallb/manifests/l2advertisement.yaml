apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default
  namespace: metallb-system
spec:
  # 指定此宣告使用的 IP 池列表
  # 可以引用多个 IPAddressPool
  ipAddressPools:
  - default

  # （可选）指定哪些节点可以宣告这些 IP
  # 如果不设置，所有节点都可以宣告
  # 示例：
  # nodeSelectors:
  # - matchLabels:
  #     kubernetes.io/hostname: k3s-server-1
  # - matchExpressions:
  #   - key: node-role.kubernetes.io/control-plane
  #     operator: Exists

  # （可选）指定宣告的接口
  # 如果不设置，使用默认接口
  # interfaces:
  # - eth0
