# Percona Server for MySQL Operator 生产环境配置
# 适用于 remote-ps-operator-1.1.0
replicaCount: 1

image:
  repository: percona/percona-server-mysql-operator
  tag: 1.1.0
  pullPolicy: IfNotPresent

watchAllNamespaces: true

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  logStructured: false
  logLevel: "INFO"
