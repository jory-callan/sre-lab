# MySQL Standalone 外部访问 Service
# NodePort: 30005，映射到 MySQL 标准端口 3306
apiVersion: v1
kind: Service
metadata:
  name: mysql-standalone-external
  namespace: mysql
  labels:
    app.kubernetes.io/name: percona-server
    app.kubernetes.io/component: mysql
    app.kubernetes.io/part-of: mysql-standalone
spec:
  type: NodePort
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      nodePort: 30005
      protocol: TCP
  selector:
    app.kubernetes.io/name: percona-server
    app.kubernetes.io/component: mysql
    app.kubernetes.io/part-of: mysql-standalone
