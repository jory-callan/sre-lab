# MySQL 认证 Secret
# Percona PS Operator 会自动生成名为 <cluster>-secrets 的 Secret
# 这里创建一个预定义的 Secret 以便使用已知密码
# 如果删掉这个 Secret，operator 会自动补一个（密码随机生成）
apiVersion: v1
kind: Secret
metadata:
  name: mysql-cluster-secrets
  namespace: mysql
type: Opaque
stringData:
  root: "mysql@czw"            # root 用户密码
  xtrabackup: "mysql@czw"      # xtrabackup 备份用户密码
  monitor: "mysql@czw"         # monitor 监控用户密码
  operator: "mysql@czw"        # operator 管理用户密码
  replication: "mysql@czw"     # 复制用户密码
