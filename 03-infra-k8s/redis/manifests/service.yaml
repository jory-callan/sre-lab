# Redis Service
# NodePort 方式暴露，端口 30003（按顺序分配）
# 支持两种方式访问：
#   1. 集群内: redis.redis.svc.cluster.local:6379
#   2. 集群外: <任一节点IP>:30003
apiVersion: v1
kind: Service
metadata:
  labels:
    app: redis
  name: redis
  namespace: redis
spec:
  ports:
    - name: redis
      port: 6379
      protocol: TCP
      targetPort: 6379
      nodePort: 30003  # 固定端口，接在 kite(30001)、grafana(30002) 之后
  selector:
    app: redis
  type: NodePort
