apiVersion: v2
name: stateful-app
description: |
  通用有状态应用 Helm Chart。
  
  支持通过 ConfigMap 注入自定义配置文件，通过 Secret 管理密码，
  通过 PVC 持久化数据，适用于 Redis / MySQL / PostgreSQL /
  MongoDB 等单实例有状态应用的 Kubernetes 部署。

  默认值配置为一个 Redis standalone 实例。

type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - stateful
  - database
  - redis
  - application
home: https://github.com/czw-sre/czw-sre