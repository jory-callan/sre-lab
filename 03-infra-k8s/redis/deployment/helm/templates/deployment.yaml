apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  namespace: {{ include "app.namespace" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.labels" . | nindent 8 }}
      annotations:
        {{- if and .Values.config.mountPath .Values.config.files }}
        config-hash: {{ .Values.config.files | toJson | sha256sum | trunc 8 }}
        {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}

      containers:
      - name: {{ include "app.name" . }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- with .Values.command }}
        command:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.args }}
        args:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.workingDir }}
        workingDir: {{ . | quote }}
        {{- end }}
        ports:
          {{- toYaml .Values.ports | nindent 10 }}
        env:
        {{- if and .Values.auth.enabled .Values.auth.envName }}
        - name: {{ .Values.auth.envName }}
          valueFrom:
            secretKeyRef:
              name: {{ default (printf "%s-auth" (include "app.fullname" .)) .Values.auth.existingSecret }}
              key: {{ .Values.auth.passwordKey }}
        {{- end }}
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.probes.enabled }}
        livenessProbe:
          exec:
            command:
            - sh
            - -ec
            - |
              RESP="$(redis-cli -h 127.0.0.1 -p {{ (index .Values.ports 0).containerPort }} -a ${{ .Values.auth.envName }} ping)"
              [ "$RESP" = "PONG" ]
          {{- toYaml .Values.probes.liveness | nindent 10 }}
        readinessProbe:
          exec:
            command:
            - sh
            - -ec
            - |
              RESP="$(redis-cli -h 127.0.0.1 -p {{ (index .Values.ports 0).containerPort }} -a ${{ .Values.auth.envName }} ping)"
              [ "$RESP" = "PONG" ]
          {{- toYaml .Values.probes.readiness | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- with .Values.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        {{- if and .Values.config.mountPath .Values.config.files }}
        - name: config
          mountPath: {{ .Values.config.mountPath }}
        {{- end }}
        {{- if .Values.storage.enabled }}
        - name: data
          mountPath: {{ .Values.storage.mountPath }}
          {{- with .Values.storage.subPath }}
          subPath: {{ . }}
          {{- end }}
        {{- end }}
      volumes:
      {{- if and .Values.config.mountPath .Values.config.files }}
      - name: config
        configMap:
          name: {{ include "app.fullname" . }}-config
      {{- end }}
      {{- if .Values.storage.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ default (printf "%s-data" (include "app.fullname" .)) .Values.storage.existingClaim }}
      {{- end }}