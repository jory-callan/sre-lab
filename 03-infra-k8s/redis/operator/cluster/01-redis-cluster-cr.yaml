# Redis Cluster CR（集群模式 — 分片 + 副本）
# 由 redis-operator 管理，创建 3 主 3 从的 Redis 集群
# 每个实例独立 PVC，支持自动分片和故障转移
#
# 适用场景:
#   - 大规模数据（单机内存不够，需分片）
#   - 客户端支持 Redis Cluster（go-redis 的 ClusterClient）
#   - 不适合小数据集和简单缓存场景
#
# ════════════════════════════════════════════════════════════════
# ⚠️  Redis Cluster 脑裂风险说明
# ════════════════════════════════════════════════════════════════
# Redis Cluster 的脑裂场景：
#   - 网络分区将集群切成两半，一半有 master + minority nodes
#   - minority 侧无法联系 majority → cluster 不可用 → 拒绝写入
#   - 这是 Cluster 的内置一致性保证（quorum-based）
#
# 脑裂概率：中等偏低（比 sentinel-ha 略高）
#   原因：Cluster 的 gossip 协议和投票机制本身是防脑裂的
#   风险点：cluster-node-timeout 设太短 → 网络抖动导致节点被标记 PFAIL
#           连续多个节点 PFAIL → 集群认为 majority 丢失 → 拒绝写入
#
# 本配置通过以下机制降低风险：
#   1) cluster-node-timeout=15000（不是默认 5000）
#   2) tcp-keepalive=60
#   3) repl-backlog-size=100mb
# 这些配置通过 additionalRedisConfig 引用的 ConfigMap 提供
# ════════════════════════════════════════════════════════════════
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: redis-cluster
  namespace: redis
spec:
  # 集群主节点数（3 主 = 自动分配 3 从，共 6 实例）
  clusterSize: 3
  clusterVersion: v7

  # 启用持久化（AOF + node.conf 持久化）
  persistenceEnabled: true

  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent

    # 资源限制（2C 节点集群，调整适应）
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 1Gi

    # 密码认证
    redisSecret:
      name: redis-auth
      key: password

  # ══════════════════════════════════════════════════════════════
  # Leader（master）配置
  # 通过 external ConfigMap 提供额外配置
  # ══════════════════════════════════════════════════════════════
  redisLeader:
    redisConfig:
      additionalRedisConfig: redis-external-config-cluster

  # ══════════════════════════════════════════════════════════════
  # Follower（replica）配置
  # ══════════════════════════════════════════════════════════════
  redisFollower:
    redisConfig:
      additionalRedisConfig: redis-external-config-cluster

  # 全局 Redis 配置（基础配置项，全部节点生效）
  redisConfig:
    dynamicConfig:
      - "appendonly yes"
      - "appendfsync everysec"
      - "maxmemory-policy noeviction"
    maxMemoryPercentOfLimit: 80

  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000

  # 数据存储
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: nfs-storage
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

    # 集群节点配置持久化（避免重启后节点拓扑信息丢失）
    nodeConfVolume: true
    nodeConfVolumeClaimTemplate:
      spec:
        storageClassName: nfs-storage
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

  # Redis Exporter — Prometheus 指标
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0
    imagePullPolicy: IfNotPresent