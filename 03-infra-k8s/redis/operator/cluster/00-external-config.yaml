---
# Cluster 额外 Redis 配置
# 此 ConfigMap 被 cluster CR 的 redisLeader.redisConfig 和 redisFollower.redisConfig 引用
# 由 operator entrypoint 读取并通过 CONFIG SET 应用
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-external-config-cluster
  namespace: redis
data:
  redis-additional.conf: |
    # ⭐ 防脑裂：Cluster 节点超时
    # 超过此时间无心跳 → 标记 PFAIL
    # 默认 5000ms 太短，网络抖动容易误触发
    cluster-node-timeout 15000

    # 网络稳定性
    tcp-keepalive 60
    repl-timeout 60
    # 复制积压缓冲区 100MB
    repl-backlog-size 104857600