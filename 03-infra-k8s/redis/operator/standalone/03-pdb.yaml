# PodDisruptionBudget — 保障单实例不被主动驱逐（如节点维护）
# minAvailable: 1 确保 Pod 不会在主动排空时被直接删除
# 注意：仅约束 voluntary disruption，node 故障仍会导致不可用
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-standalone-pdb
  namespace: redis
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: redis-standalone