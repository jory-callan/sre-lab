# Redis 外部访问 Service（NodePort）
# 单独创建的原因：operator 的默认 Service 是 ClusterIP
# 补充一个 NodePort Service 以支持集群外直连
# 标签选择器与 operator 创建的资源匹配
apiVersion: v1
kind: Service
metadata:
  name: redis-external
  namespace: redis
  labels:
    app: redis-standalone
    redis_setup_type: standalone
    role: standalone
spec:
  type: NodePort
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
      name: client
      nodePort: 30003  # 固定端口，接在 kite(30001)、grafana(30002) 之后
  selector:
    app: redis-standalone
    redis_setup_type: standalone
    role: standalone
