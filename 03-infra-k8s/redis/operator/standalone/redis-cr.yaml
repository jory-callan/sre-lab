# Redis Standalone CR
# 由 redis-operator 管理，创建单实例 Redis StatefulSet + Service
# 镜像: quay.io/opstree/redis:v7.0.15
#   ⚠️ 必须使用 operator 定制镜像（含自定义 entrypoint，负责密码注入、配置合并等）
#   官方 redis 镜像没有这些 hook，会导致 redisSecret 密码认证失效
#   v7.0.x 仍为 BSD 开源协议（v7.4+ 才改为 SSPL/RSAL）
# 持久化: 1Gi PVC (local-path)
# 认证: 引用 redis-auth Secret 中的 password
# 外部访问: 通过同目录下的 02-service-external.yaml（NodePort:30003）
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis-standalone
  namespace: redis
spec:
  # Kubernetes 相关配置
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    # 密码认证 - 引用 Secret 中的 password 字段
    redisSecret:
      name: redis-auth
      key: password
    # 默认服务类型为 ClusterIP，外部访问通过单独的 NodePort Service
    service:
      serviceType: ClusterIP

  # Pod 安全上下文
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000

  # 持久化存储
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

  # Redis Exporter - 暴露 Prometheus 指标
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
