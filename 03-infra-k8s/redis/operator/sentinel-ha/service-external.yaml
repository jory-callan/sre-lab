# Redis Sentinel 外部访问 Service（NodePort:30004）
# 通过 NodePort 直接连接 Sentinel，用于集群外客户端获取主节点地址
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel-external
  namespace: redis
  labels:
    redis_setup_type: sentinel
spec:
  type: NodePort
  ports:
    - protocol: TCP
      port: 26379
      targetPort: 26379
      name: sentinel
      nodePort: 30004
  selector:
    redis_setup_type: sentinel
    role: sentinel
