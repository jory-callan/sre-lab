# Redis Replication CR with Sentinel HA（主从复制 + 哨兵高可用）
# 由 redis-operator 管理，创建：
#   - 1主2从的 Redis 主从复制组（3 个 StatefulSet Pod）
#   - 3 个 Sentine lPod（自动创建，监控主从组）
#   - 密码从 kubernetesConfig.redisSecret 自动注入到 sentinel 的 MASTER_PASSWORD
# 注意：sentinel 不由独立的 RedisSentinel CR 管理，而是通过 spec.sentinel 内嵌在 replication 中
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: redis-replication
  namespace: redis
spec:
  # 总副本数（1主 + 2从 = 3）
  clusterSize: 3

  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    # 密码认证 - sentinel 会自动继承此 Secret 注入 MASTER_PASSWORD
    redisSecret:
      name: redis-auth
      key: password

  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000

  # 持久化存储
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

  # Redis Exporter
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0
    imagePullPolicy: IfNotPresent

  # ================================================================
  # Sentinel 配置（内嵌在 RedisReplication CR 中）
  # 由 replication controller 自动创建 sentinel Pod
  # 密码从 kubernetesConfig.redisSecret 自动注入 MASTER_PASSWORD
  # 不需要创建独立的 RedisSentinel CR
  # ================================================================
  sentinel:
    # Sentinel Pod 数量（生产环境至少 3 个）
    size: 3

    image: quay.io/opstree/redis-sentinel:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # 哨兵配置（值需为字符串类型）
    quorum: "2"                    # 判定主节点客观下线所需同意数
    parallelSyncs: "1"             # 故障转移后同时同步的新从节点数
    failoverTimeout: "10000"       # 故障转移超时（毫秒）
    downAfterMilliseconds: "5000"  # 判定节点下线的时间（毫秒）
