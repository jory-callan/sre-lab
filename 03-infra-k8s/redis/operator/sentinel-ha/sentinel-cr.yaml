# Redis Sentinel CR（哨兵高可用）
# 由 redis-operator 管理，创建 3 节点 Sentinel 集群
# 监控 redis-replication 主从组，发生故障时自动切换
# 注意：需先创建同目录下的 replication-cr.yaml
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: redis-sentinel
  namespace: redis
spec:
  # Sentinel 节点数（生产环境至少 3 个）
  clusterSize: 3

  # 关联的主从复制组
  redisSentinelConfig:
    redisReplicationName: redis-replication

  kubernetesConfig:
    image: quay.io/opstree/redis-sentinel:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000

  pdb:
    enabled: false
    minAvailable: 1
