---
# Sentinel-HA 额外 Redis 配置
# 此 ConfigMap 被 sentinel-ha CR 的 additionalRedisConfig 引用
# 由 operator entrypoint 读取并通过 CONFIG SET 应用
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-external-config-sentinel
  namespace: redis
data:
  redis-additional.conf: |
    # ⭐ 防脑裂：写入仲裁
    # master 至少 1 个 replica 在线才接受写入
    # 避免分区后两个 master 都有新数据
    min-replicas-to-write 1
    # replica 延迟超过 10 秒，master 拒绝写入
    # 防止 replica 落后太多时的数据不一致
    min-replicas-max-lag 10

    # 网络稳定性
    tcp-keepalive 60
    repl-timeout 60
    # 复制积压缓冲区 100MB（默认 1MB）
    # 网络短暂中断后 replica 能增量同步
    repl-backlog-size 104857600