apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: redisfailover-ha
  namespace: redis-spotahome
spec:
  # ─── 认证 ───
  # Secret 中 key 必须为 "password"
  auth:
    secretPath: redis-auth

  # ─── Redis 配置 ───
  redis:
    # 镜像版本 — 留空则操作器默认 redis:6.2.6-alpine
    image: redis:5.0.8
    imagePullPolicy: IfNotPresent
    replicas: 3

    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # 自定义配置
    customConfig:
      - "tcp-keepalive 60"
      - "min-replicas-to-write 1"
      - "min-replicas-max-lag 10"
      - "repl-timeout 60"
      - "repl-backlog-size 104857600"

    # 存储
    storage:
      keepAfterDeletion: true
      persistentVolumeClaim:
        metadata:
          name: redisfailover-ha-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
          storageClassName: nfs-storage

    # Redis Exporter (Prometheus 指标 /metrics:9121)
    exporter:
      enabled: true
      image: quay.io/oliver006/redis_exporter:v1.43.0
      imagePullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 64Mi

    # 节点反亲和 — 同节点不调度第二个 Redis Pod
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: redis
                app.kubernetes.io/part-of: redis-failover

    # 容忍度 — 允许调度到任意节点
    tolerations:
      - operator: Exists

  # ─── Sentinel 配置 ───
  sentinel:
    image: redis:5.0.8
    imagePullPolicy: IfNotPresent
    replicas: 3

    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 200Mi

    # Sentinel 专用配置
    customConfig:
      - "down-after-milliseconds 15000"
      - "failover-timeout 30000"

    # Sentinel Exporter (Prometheus 指标 /metrics:9355)
    exporter:
      enabled: true
      image: quay.io/oliver006/redis_exporter:v1.43.0
      imagePullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 64Mi

    # 节点反亲和 — 同节点不调度第二个 Sentinel Pod
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: sentinel
                app.kubernetes.io/part-of: redis-failover

    tolerations:
      - operator: Exists