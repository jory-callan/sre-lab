# Kite PersistentVolumeClaim
# 持久化存储 SQLite 数据库文件，确保 Pod 重启后数据不丢失
# 使用 k3s 内置的 local-path StorageClass，在宿主机上分配本地存储
# 注意：ReadWriteOnce 意味着同一时间只能有一个 Pod 挂载此卷
# 因此 Deployment 必须使用 Recreate 策略（而非 RollingUpdate）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kite-storage
  namespace: kite
spec:
  accessModes:
    - ReadWriteOnce  # 单节点读写
  resources:
    requests:
      storage: 1Gi  # 1GB 足够存储 Kite 的 SQLite 数据和配置
  storageClassName: nfs-storage  # NFS 共享存储，Pod 调度到任意节点数据不丢失
