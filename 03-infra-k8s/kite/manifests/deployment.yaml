# Kite Deployment - 主部署配置
# 部署 Kite Kubernetes 管理面板，包含持久化存储和健康检查
#
# 镜像：ghcr.io/kite-org/kite（官方提供的 Kite 容器镜像）
# 存储：通过 PVC 持久化 SQLite 数据到 hostPath
# 策略：Recreate（必须，因为 PVC 是 ReadWriteOnce，不能同时被多个 Pod 挂载）
# 权限：绑定 cluster-admin ClusterRole，可管理全集群资源
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kite
  name: kite
  namespace: kite
spec:
  replicas: 1  # 单副本，SQLite 不支持多副本写入
  selector:
    matchLabels:
      app: kite
  strategy:
    type: Recreate  # 必须使用 Recreate 策略
    # 原因：PVC 使用 ReadWriteOnce 访问模式，同一时刻只允许一个 Pod 挂载
    # RollingUpdate 会先创建新 Pod 再销毁旧 Pod，导致新 Pod 因 PVC 被占用而 pending
  template:
    metadata:
      labels:
        app: kite
    spec:
      serviceAccountName: kite  # 绑定拥有 cluster-admin 权限的 ServiceAccount
      containers:
        - image: ghcr.io/kite-org/kite:latest
          imagePullPolicy: IfNotPresent  # 本地已有镜像则不再拉取
          name: kite
          resources:
            limits:
              cpu: 1000m  # 峰值可用 1 核
              memory: 512Mi  # 峰值可用 512MB 内存
            requests:
              cpu: 100m  # 保证最低 0.1 核
              memory: 128Mi  # 保证最低 128MB 内存
          # 存活探针 - Pod 不健康时自动重启
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10  # 启动后 10 秒开始检测
            periodSeconds: 10  # 每 10 秒检测一次
          # 就绪探针 - Pod 就绪后才加入 Service 接收流量
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          ports:
            - containerPort: 8080  # Kite 默认监听端口
              protocol: TCP
          # 持久化卷挂载 - SQLite 数据库文件存储在 PVC 上
          # Kite 默认数据库路径为 /app/data/kite.db
          volumeMounts:
            - name: data
              mountPath: /app/data  # SQLite 数据目录
      # 持久化卷定义 - 引用 PVC
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kite-storage  # 对应 pvc.yaml 中定义的 PVC
