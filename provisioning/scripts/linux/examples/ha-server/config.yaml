# 高可用 k3s Server 节点配置示例
#
# 使用场景：
#   - 节点 1: 修改为 cluster-init: true
#   - 节点 2、3: 配置 server 指向节点 1
#
# 使用方法：
#   1. 复制此文件到 .. 目录，命名为 config.yaml
#   2. 根据节点角色修改配置
#   3. 运行 ../install-k3s.sh

# ==============================================
# 基本配置
# ==============================================

# ---- 节点 1（第一个 master）配置 ----
cluster-init: true

# ---- 节点 2、3（加入 master）配置 ----
# cluster-init: false
# server: "https://192.168.1.100:6443"  # 指向节点 1

# 集群认证 token（所有节点必须一致）
token: "SVfhcNDTDiK6muhKCgvFDLuKhxuF892Z"

# ==============================================
# 禁用组件
# ==============================================

disable:
  - traefik
  - servicelb

# ==============================================
# 镜像仓库
# ==============================================

system-default-registry: "registry.cn-hangzhou.aliyuncs.com"

# ==============================================
# TLS 配置
# ==============================================

tls-san:
  - "k3s-server"
  - "192.168.1.100"  # 节点 1 的 IP
  - "192.168.1.101"  # 节点 2 的 IP（如有）
  - "192.168.1.102"  # 节点 3 的 IP（如有）
  - "k8s.example.com" # 外部访问域名（如有）

# ==============================================
# Kubelet 配置
# ==============================================

kubelet-arg:
  - "container-log-max-size=100Mi"
  - "container-log-max-files=5"
  - "image-gc-high-threshold=90"
  - "image-gc-low-threshold=80"
  - "system-reserved=cpu=0.5,memory=512Mi"
  - "kube-reserved=cpu=0.2,memory=256Mi"

# ==============================================
# ETCD 配置
# ==============================================

etcd-snapshot-schedule-cron: "0 */6 * * *"
etcd-snapshot-retention: 30

# etcd 自动压缩和空间限制
etcd-arg:
  - "auto-compaction-retention=1"
  - "quota-backend-bytes=8589934592"  # 8GB
