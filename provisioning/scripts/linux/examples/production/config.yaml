# 生产环境 100+ 节点配置示例
#
# 前置要求：
#   [ ] 数据盘已挂载到 /data
#   [ ] 已运行 prepare-data-disk.sh 准备数据盘
#   [ ] DNS/时间同步已配置
#   [ ] 节点间网络已互通
#
# 配置特点：
#   - 数据目录分离到独立 SSD 盘
#   - 严格的日志轮转
#   - 完善的资源预留
#   - etcd 性能优化
#   - 安全加固

# ==============================================
# 基本配置
# ==============================================

# 集群初始化（第一个 server 节点设为 true）
cluster-init: true

# 集群认证 token（生产环境用强随机 token）
# 生成方式：openssl rand -base64 32 | tr -d '/+=' | cut -c1-32
token: "替换为生产环境强随机token"

# ==============================================
# 数据目录配置（重要！必须配置！）
# ==============================================

# k3s 数据目录（请确保这是独立 SSD 盘）
data-dir: "/data/k3s"

# ==============================================
# 禁用组件
# ==============================================

disable:
  - traefik                    # 推荐使用 ingress-nginx
  - servicelb                  # 推荐使用 MetalLB 或云厂商 LB

# ==============================================
# 镜像仓库配置
# ==============================================

system-default-registry: "registry.cn-hangzhou.aliyuncs.com"

# ==============================================
# TLS 配置（生产环境必须配置）
# ==============================================

tls-san:
  - "k3s-server"
  - "kubernetes"
  - "kubernetes.default"
  - "kubernetes.default.svc"
  - "kubernetes.default.svc.cluster.local"
  - "192.168.1.100"         # 替换为实际 IP
  - "192.168.1.101"         # 如有 HA 节点也添加
  - "192.168.1.102"
  - "api.k8s.example.com"    # 替换为实际域名

# ==============================================
# Kubelet 配置（生产环境优化）
# ==============================================

kubelet-arg:
  # 容器日志限制（非常重要！防止日志占满磁盘）
  - "container-log-max-size=50Mi"
  - "container-log-max-files=3"
  
  # 镜像垃圾回收（更激进的策略）
  - "image-gc-high-threshold=75"
  - "image-gc-low-threshold=65"
  
  # 镜像拉取超时
  - "image-pull-progress-deadline=2m"
  
  # 资源预留（防止系统资源耗尽）
  - "system-reserved=cpu=1.0,memory=1.5Gi,ephemeral-storage=10Gi"
  - "kube-reserved=cpu=0.5,memory=1.0Gi,ephemeral-storage=5Gi"
  
  # 驱逐策略（磁盘/内存压力时驱逐 pod）
  - "eviction-hard=memory.available<500Mi,nodefs.available<10%,nodefs.inodesFree<5%,imagefs.available<15%"
  - "eviction-soft=memory.available<700Mi,nodefs.available<15%"
  - "eviction-soft-grace-period=memory.available=2m,nodefs.available=5m"
  - "eviction-minimum-reclaim=imagefs.available=10%"
  
  # Pod 限制
  - "max-pods=110"
  - "pod-pids-limit=65536"
  
  # 节点状态更新频率
  - "node-status-update-frequency=10s"
  - "node-status-report-frequency=1m"
  
  # 安全加固
  - "protect-kernel-defaults=true"

# ==============================================
# ETCD 配置（生产环境优化）
# ==============================================

# 自动快照（更频繁的备份）
etcd-snapshot-schedule-cron: "0 */3 * * *"  # 每3小时一次
etcd-snapshot-retention: 24                  # 保留24个快照
etcd-snapshot-dir: "/data/k3s/snapshots"     # 快照目录

# etcd 性能优化
etcd-arg:
  # 自动压缩（每小时）
  - "auto-compaction-retention=1"
  
  # 空间配额（官方推荐最大 8G）
  - "quota-backend-bytes=8589934592"  # 8GB
  
  # 心跳间隔和选举超时
  - "heartbeat-interval=100"
  - "election-timeout=1000"
  
  # 最大事务数
  - "max-txn-ops=1024"
  
  # 最大请求字节数（1.5MB）
  - "max-request-bytes=1572864"
  
  # 快照频率（减少 io 压力）
  - "snapshot-count=100000"

# ==============================================
# API Server 配置（生产环境优化）
# ==============================================

kube-apiserver-arg:
  # 请求限制
  - "max-requests-inflight=3000"
  - "max-mutating-requests-inflight=1000"
  
  # API QPS/Burst 限制
  - "kube-api-qps=1000"
  - "kube-api-burst=2000"
  
  # 审计日志（生产环境建议开启，目录需要先创建）
  # - "audit-log-path=/data/k3s/audit/audit.log"
  # - "audit-log-maxage=30"
  # - "audit-log-maxbackup=10"
  # - "audit-log-maxsize=100"
  
  # 事件留存时间
  - "event-ttl=24h"
  
  # 启用的准入控制器
  - "enable-admission-plugins=NodeRestriction"
  
  # 服务节点端口范围
  - "service-node-port-range=30000-32767"
  
  # 超时设置
  - "request-timeout=1m"
  - "min-request-timeout=1800"

# ==============================================
# Controller Manager 配置
# ==============================================

kube-controller-manager-arg:
  # 节点监控周期
  - "node-monitor-period=5s"
  - "node-monitor-grace-period=40s"
  - "pod-eviction-timeout=5m"
  
  # 并发数
  - "concurrent-deployment-syncs=5"
  - "concurrent-endpoint-syncs=5"
  - "concurrent-namespace-syncs=10"
  - "concurrent-replicaset-syncs=5"
  
  # 资源限制
  - "kube-api-qps=50"
  - "kube-api-burst=100"
  
  # 终止 Pod GC
  - "terminated-pod-gc-threshold=1000"

# ==============================================
# Scheduler 配置
# ==============================================

kube-scheduler-arg:
  # 调度器 QPS/Burst
  - "kube-api-qps=100"
  - "kube-api-burst=200"

# ==============================================
# 网络配置
# ==============================================

# 集群 CIDR（Pod 网段）
cluster-cidr: "10.42.0.0/16"

# Service CIDR
service-cidr: "10.43.0.0/16"

# Cluster DNS
cluster-dns: "10.43.0.10"

# 集群域名
cluster-domain: "cluster.local"

# ==============================================
# 安全配置
# ==============================================

# 启用 Secrets 加密
secrets-encryption: true

# 保护内核默认值
protect-kernel-defaults: true

# ==============================================
# 其他配置
# ==============================================

# kubeconfig 权限
write-kubeconfig-mode: "600"

# 禁用云控制器（如使用云厂商 LoadBalancer 可开启）
disable-cloud-controller: true

# ==============================================
# 部署检查清单
# ==============================================
#
# 使用此配置前请确认：
# [ ] 1. 数据盘已挂载到 /data
# [ ] 2. 已运行 prepare-data-disk.sh 准备数据盘
# [ ] 3. data-dir 配置正确
# [ ] 4. token 已替换为强随机字符串
# [ ] 5. tls-san 已填入正确的 IP/域名
# [ ] 6. 根据节点资源调整 system-reserved/kube-reserved
# [ ] 7. etcd 数据盘是 SSD（生产环境必须！）
# [ ] 8. 已配置时间同步（chrony/ntp）
# [ ] 9. 节点间网络延迟 < 10ms
# [ ] 10. 已配置监控和告警
