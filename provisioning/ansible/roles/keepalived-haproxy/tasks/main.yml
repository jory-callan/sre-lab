---
# keepalived-haproxy 角色任务入口
# 为 k3s API Server 提供高可用 VIP 和负载均衡
#
# 前置条件:
#   - k3s server 已安装并运行在 6443 端口
#
# 工作原理:
#   - haproxy 提供 TCP 负载均衡
#   - keepalived 通过 VRRP 提供 VIP 漂移
#
# 使用说明:
#   复制配置前，请先替换 files/ 目录中 __CHANGEME_* 占位符为实际值

- name: 安装 haproxy 和 keepalived
  package:
    name:
      - haproxy
      - keepalived
    state: present

- name: 创建 haproxy conf.d 目录
  file:
    path: /etc/haproxy/conf.d
    state: directory
    mode: '0755'

- name: 部署 haproxy 主配置
  copy:
    src: haproxy/haproxy.cfg
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  notify: restart haproxy

- name: 部署 haproxy 模块配置
  copy:
    src: "haproxy/conf.d/"
    dest: /etc/haproxy/conf.d/
    mode: '0644'
  notify: restart haproxy

- name: 创建 keepalived conf.d 目录
  file:
    path: /etc/keepalived/conf.d
    state: directory
    mode: '0755'

- name: 部署 keepalived 配置
  copy:
    src: keepalived/keepalived.conf
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
  notify: restart keepalived

- name: 注入 keepalived VIP 地址
  replace:
    path: /etc/keepalived/keepalived.conf
    regexp: '__CHANGEME_keepalived_vip__'
    replace: '{{ keepalived_vip }}'
  notify: restart keepalived

- name: 启用并启动 haproxy
  systemd:
    name: haproxy
    state: started
    enabled: yes

- name: 启用并启动 keepalived
  systemd:
    name: keepalived
    state: started
    enabled: yes
