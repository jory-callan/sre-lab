---
# keepalived-haproxy 角色任务入口
# 为 k3s API Server 提供高可用 VIP 和负载均衡
#
# 前置条件:
#   - k3s server 已安装并运行在 6443 端口
#   - vip_address 变量已定义（如 192.168.5.254）
#
# 工作原理:
#   - haproxy 在每个 server 节点上监听 VIP:6443，转发到所有 server 节点的 6443
#   - keepalived 提供 VIP 漂移，首节点为 MASTER，其余为 BACKUP

- name: 安装 haproxy 和 keepalived
  package:
    name:
      - haproxy
      - keepalived
    state: present

- name: 部署 haproxy 配置
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  notify: restart haproxy

- name: 部署 keepalived 配置
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
  notify: restart keepalived

- name: 启用并启动 haproxy
  systemd:
    name: haproxy
    state: started
    enabled: yes

- name: 启用并启动 keepalived
  systemd:
    name: keepalived
    state: started
    enabled: yes
