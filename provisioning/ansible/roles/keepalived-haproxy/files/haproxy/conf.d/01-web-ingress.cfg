# /etc/haproxy/conf.d/02-web-ingress.cfg
# ============================================
# 业务流量转发（SSL 卸载 + Ingress 代理）
# ============================================

# frontend web-in
#     bind *:80
#     bind *:443 ssl crt /etc/haproxy/certs/your-domain.pem
#     mode http
#     option httplog
#     # 强制跳转 HTTPS（可选）
#     # redirect scheme https if !{ ssl_fc }
#     default_backend web-ingress

# backend web-ingress
#     mode http
#     balance roundrobin
#     option httpchk GET /healthz
#     # 转发到 K3s 集群的 Ingress Controller
#     # 方式一：通过 MetalLB 分配的 LoadBalancer IP
#     # server ingress-lb 192.168.5.200:80 check
#     # 方式二：通过 NodePort（如果 Ingress 用 NodePort 暴露）
#     # server ingress-np 192.168.5.10:30080 check
#     # 方式三：通过 ClusterIP（需要 HAProxy 在集群内，或网络可达）
#     # server ingress-cluster 10.43.0.10:80 check
