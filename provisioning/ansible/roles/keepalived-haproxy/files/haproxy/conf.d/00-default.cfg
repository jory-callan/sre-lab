# /etc/haproxy/conf.d/00-default.cfg
# ============================================
# 默认配置：统计页面 + 占位后端
# ============================================

# ---- 统计页面（仅本机访问，安全加固） ----
listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin123
    stats admin if LOCALHOST

; # ---- 占位后端（防止 HAProxy 启动报错） ----
; frontend placeholder-in
;     bind *:8080
;     mode http
;     default_backend placeholder-out

; backend placeholder-out
;     mode http
;     server placeholder 127.0.0.1:9999 check disabled