# /etc/keepalived/keepalived.conf
# ============================================
# 生产级 VRRP 高可用网关配置
# ============================================

global_defs {
    router_id __CHANGEME_hostname__        # 每个节点唯一
    enable_script_security
}

# ---- HAProxy 健康检查 ----
vrrp_script chk_haproxy {
    script "/usr/bin/pgrep -x haproxy"
    interval 2
    timeout 2
    fall 3
    rise 2
    weight -10
}

# ---- VRRP 实例 ----
vrrp_instance VI_1 {
    state BACKUP
    nopreempt
    interface eth0
    virtual_router_id 51
    priority 150      # 主节点 150，备节点 100/110
    advert_int 1
    
    authentication {
        auth_type PASS
        auth_pass YourStrongPassword
    }
    
    virtual_ipaddress {
        __CHANGEME_keepalived-vip__ dev eth0 label eth0:1
    }
    
    track_script {
        chk_haproxy
    }
}

include /etc/keepalived/conf.d