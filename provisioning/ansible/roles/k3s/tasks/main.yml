---
# K3s 角色任务入口
# 按步骤拆分，通过 main.yml 串联

- name: 检查 k3s 是否已安装
  command: which k3s
  register: k3s_check
  changed_when: false
  failed_when: false

- name: 设置角色（server / agent）
  set_fact:
    k3s_role: "{{ 'server' if 'k3s_server' in group_names else 'agent' }}"

- name: 检测是否为第一个 server 节点
  set_fact:
    k3s_is_first_server: "{{ inventory_hostname == groups['k3s_server'][0] }}"
  when: k3s_role == 'server'

- name: 收集所有 server 节点 IP（用于 tls-san）
  set_fact:
    k3s_server_ips: >-
      {{ groups['k3s_server'] | map('extract', hostvars, 'ansible_default_ipv4') | selectattr('address', 'defined') | map(attribute='address') | list }}
  when: k3s_role == 'server'

- name: 收集所有 server 节点 hostname（用于 tls-san）
  set_fact:
    k3s_server_hostnames: >-
      {{ groups['k3s_server'] | map('extract', hostvars, 'ansible_hostname') | list }}
  when: k3s_role == 'server'

- import_tasks: prereq.yml

- import_tasks: config.yml

- import_tasks: install.yml
  when: k3s_check.rc != 0

- import_tasks: kubectl.yml
  when: k3s_role == 'server'

- import_tasks: helm.yml
  when: k3s_role == 'server'

- import_tasks: kubeconfig.yml
  when: k3s_role == 'server'
