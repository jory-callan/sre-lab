---
# 提示拷贝 kubeconfig 到本地管理机（最后展示）

- name: 提示拷贝 kubeconfig 到本地管理机
  debug:
    msg:
      - "kubeconfig 已就绪！服务器端路径：/root/.kube/config"
      - "由于已配置免密登录，可在本机执行以下命令拉取 kubeconfig："
      - ""
      - "  scp root@{{ ansible_default_ipv4.address }}:/root/.kube/config ~/.kube/k3s-{{ ansible_hostname }}.config"
      - ""
      - "然后在本地使用 --kubeconfig 或 KUBECONFIG 环境变量切换集群："
      - "  kubectl --kubeconfig ~/.kube/k3s-{{ ansible_hostname }}.config get nodes"
      - "  export KUBECONFIG=~/.kube/k3s-{{ ansible_hostname }}.config"
      - ""
      - "如需合并到本地默认 kubeconfig（推荐）："
      - "  KUBECONFIG=~/.kube/k3s-{{ ansible_hostname }}.config:~/.kube/config \\"
      - "    kubectl config view --flatten > ~/.kube/config.merged && \\"
      - "    mv ~/.kube/config.merged ~/.kube/config"
