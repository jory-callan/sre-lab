services:
  nginx:
    image: nginx:1.28.0
    restart: "always"
    environment:
      TZ: 'Asia/Shanghai'
    networks:
      - prodnet
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./conf.d/:/etc/nginx/conf.d/
      - ./ssl/:/etc/nginx/ssl/
      - ${PROJECT_CODE_DIR}:/html/
      - ${PROJECT_LOG_DIR}:/var/log/nginx/
    healthcheck:
      test: "curl -f http://localhost:443/"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4' # 限制 CPU 使用量为 4 个核心
          memory: 2048M # 限制内存使用量为 2048MB
        # reservations:
        #   memory: 100M # 预留内存为 200MB

networks:
  prodnet:
    external: true
