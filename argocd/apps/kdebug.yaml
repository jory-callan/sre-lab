apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kdebug
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jory-callan/sre-lab.git'
    targetRevision: main
    path: k8s/apps/kdebug/manifests
  destination:
    namespace: kdebug
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
