# Kite 自定义 values.yaml - 持久化 + ingress 配置

# 部署策略 - 使用 Recreate 避免 PVC 挂载冲突
deploymentStrategy:
  type: Recreate

# 持久化配置
db:
  type: sqlite
  sqlite:
    persistence:
      pvc:
        enabled: true  # 启用 PVC 持久化
        storageClass: "local-path"  # k3s 默认 StorageClass
        accessModes:
          - ReadWriteOnce
        size: 1Gi  # 1GB 存储空间
      mountPath: /data  # 挂载路径

# Ingress 配置
ingress:
  enabled: true  # 启用 ingress
  className: "nginx"  # 使用 ingress-nginx
  hosts:
    - host: kite.czw-sre.internal  # 访问域名
      paths:
        - path: /
          pathType: Prefix
