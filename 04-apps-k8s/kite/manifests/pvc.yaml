# Kite PVC - 持久化存储 SQLite 数据
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kite-storage
  namespace: kite
spec:
  accessModes:
    - ReadWriteOnce  # 单节点读写
  resources:
    requests:
      storage: 1Gi  # 1GB 足够存储 Kite 数据
  storageClassName: local-path  # k3s 默认的 local-path StorageClass
