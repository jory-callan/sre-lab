# Kite ClusterRoleBinding
# 将 kite ServiceAccount 绑定到 cluster-admin 角色
# 授予 Kite Web UI 对集群所有 API 资源的完全管理访问权限
# ⚠️ 注意：这是全集群通配符权限，Kite 管理界面中可操作所有命名空间的资源
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kite
    namespace: kite
