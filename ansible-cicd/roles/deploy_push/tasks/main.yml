# 检查必备变量
- name: 开始 构建 操作, php , 检查必备变量
  assert:
    that:
      - item is defined
    fail_msg: "缺少 PHP 构建必要的变量: {{ item }}"
    quiet: true
  loop:
    - ARTIFACT_DIR
    - DEPLOY_HOSTS
    - DEPLOY_ROOT_DIR
    - PROJECT_PATH

- name: 打印 PHP 构建开始信息
  debug:
    msg:
      - "========================================"
      - "    推送到服务器 任务开始"
      - "========================================"
      - "构建产物目录: {{ ARTIFACT_DIR }}"
      - "部署目标主机: {{ DEPLOY_HOSTS | default('未配置') }}"
      - "部署目标根路径: {{ DEPLOY_ROOT_DIR | default('未配置') }}"
      - "部署目标路径: {{ DEPLOY_ROOT_DIR }}/{{ PROJECT_PATH }}"

# 设置目标部署路径
- name: 设置构建产物目录路径 由 ARTIFACT_ROOT_DIR + PROJECT_PATH 构成
  set_fact:
    # 无论原始地址是 https 还是 git@，都可以用这个逻辑提取路径
    DEPLOY_DIR: "{{ DEPLOY_ROOT_DIR }}/{{ PROJECT_PATH }}"

# Rsync 增量推送到目标服务器
# 这里使用 delegate_to 遍历所有目标服务器进行推送
- name: 增量同步代码到目标服务器
  synchronize:
    src: "{{ ARTIFACT_DIR }}/"  # 本机构建目录
    dest: "{{ DEPLOY_DIR }}/" # 远程服务器目录
    # delete: yes  # 远程删除本机不存在的文件，保证代码一致
    rsync_opts:
      - "--chmod=755"         # 默认目录/文件权限
      - "--exclude='.git'"    # 双重保险，排除 .git
      - "--exclude='*.log'"   # 排除日志
      - "--exclude='node_modules'"  # 排除 node_modules 目录
      # - "--checksum"          # 使用校验和而非时间戳判断变更，更精准
  loop: "{{ groups[DEPLOY_HOSTS] | default([]) }}"
  delegate_to: "{{ item }}"
  # 当有文件变更时才报告 changed
  register: sync_result

# 修正远程文件权限
# Rsync 传输后，文件所有者通常是你连接 SSH 的用户。
# 必须在远程服务器上执行 chown，改为 www-data。
# 这里直接跑一遍 file 权限修正通常开销不大，为了安全建议每次都校验
- name: 修正远程文件所有者和组为 www-data
  file:
    path: "{{ DEPLOY_ROOT_DIR }}"
    state: directory
    owner: www-data
    group: www-data
    recurse: yes # 递归修改整个目录
  loop: "{{ groups[DEPLOY_HOSTS] | default([]) }}"
  delegate_to: "{{ item }}"
  # 只有当同步发生过，或者目录不存在时，才需要修改权限
  when: sync_result.results | selectattr('changed', 'equalto', true) | list | length > 0 or true 

# 打印部署结果
- name: 打印部署完成信息
  debug:
    msg:
      - "========================================"
      - "    部署任务完成"
      - "========================================"
      - "目标服务器组: {{ DEPLOY_HOSTS }}"
      - "产物目录: {{ ARTIFACT_DIR }}"
      - "远程目录: {{ DEPLOY_DIR }}"
      - "状态: 已同步并修正权限"
