apiVersion: v1
kind: ResourceQuota
metadata:
  name: victorialogs-quota
  namespace: victorialogs
spec:
  hard:
    requests.cpu: "1500m"
    requests.memory: "2Gi"
    limits.cpu: "2000m"
    limits.memory: "3Gi"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: victorialogs-limits
  namespace: victorialogs
spec:
  limits:
    - type: Container
      default:
        cpu: 100m
        memory: 128Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: 500m
        memory: 512Mi
