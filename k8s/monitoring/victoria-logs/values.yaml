# Victoria Logs Helm values
# Referenced by argocd/victoria-logs/application.yaml via $values/apps/victoria-logs/values.yaml
server:
  retentionPeriod: 7
  # 本地索引缓存（2Gi，实际数据存 MinIO S3）
  persistentVolume:
    enabled: true
    storageClassName: nfs-client
    size: 2Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # ── VictoriaLogs Web UI Ingress ─────────────────────────
  # ingress 在 server 层级下
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - name: logs.czw-sre.internal
        path:
          - /
        port: http
    tls:
      - secretName: vl-logs-tls
        hosts:
          - logs.czw-sre.internal
