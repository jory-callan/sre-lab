# VictoriaLogs StatefulSet
# 单实例日志存储后端，兼容 Loki 查询协议
# 使用 VolumeClaimTemplate 自动创建 PVC
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: victoria-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: victoria-logs
    app.kubernetes.io/component: logs-storage
spec:
  serviceName: victoria-logs
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: victoria-logs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoria-logs
        app.kubernetes.io/component: logs-storage
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: victoria-logs
          image: victoriametrics/victoria-logs:v1.49.0
          imagePullPolicy: IfNotPresent
          args:
            - -storageDataPath=/victoria-logs-data
            - -httpListenAddr=:9428
            - -retentionPeriod=30d
            - -loggerFormat=json
            - -memory.allowedPercent=60
            - -maxConcurrentInserts=16
          ports:
            - name: http
              containerPort: 9428
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
          volumeMounts:
            - name: data
              mountPath: /victoria-logs-data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nfs-storage
        resources:
          requests:
            storage: 10Gi
