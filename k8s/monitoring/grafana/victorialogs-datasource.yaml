# VictoriaLogs Grafana 数据源 (通过官方插件)
# 依赖 victoriametrics-logs-datasource 插件
apiVersion: v1
kind: ConfigMap
metadata:
  name: victoria-logs-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
    grafana_datasource_ref: victoria-logs
data:
  victoria-logs-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victoria-logs.monitoring.svc.cluster.local:9428
        isDefault: false
        editable: true
