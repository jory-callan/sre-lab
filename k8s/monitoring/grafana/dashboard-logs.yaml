# VictoriaLogs 日志浏览 Dashboard
# 通过 Grafana sidecar 自动发现并加载（label: grafana_dashboard=1）
#
# 使用方法:
#   1. Grafana → 搜索 "日志" → VictoriaLogs - 日志查询
#   2. 顶部选择命名空间/容器/输入关键字
#   3. 时间选择器控制查询范围
#
# 变量说明:
#   search    - 关键字搜索，输入 error/WARNING/SELECT 等
#   namespace - 命名空间单选，All=全部
#   container - 容器名单选，All=全部
#
# 底层字段:
#   kubernetes.namespace_name - 命名空间（VictoriaLogs 实际字段）
#   kubernetes.container_name - 容器名
#   _msg - 日志内容
#   log_processed.* - 已解析的 JSON 日志字段
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  victorialogs-logs.json: |
    {
      "title": "VictoriaLogs - 日志查询",
      "description": "K8s 集群日志实时查询面板，支持关键字、命名空间、容器过滤",
      "tags": ["victorialogs", "logging", "kubernetes"],
      "timezone": "Asia/Shanghai",
      "schemaVersion": 39,
      "version": 4,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h"]
      },
      "templating": {
        "list": [
          {
            "name": "search",
            "type": "textbox",
            "label": "🔍 关键字搜索",
            "query": "",
            "description": "输入搜索词: error / WARNING / SELECT / 多个词用空格"
          },
          {
            "name": "namespace",
            "type": "custom",
            "label": "📦 命名空间",
            "query": "monitoring, mysql, cnpg-system, pg17, redis, redis-operator, default, kube-system, ingress-nginx, cert-manager, metallb-system, mysql-operator",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "sort": 1
          },
          {
            "name": "container",
            "type": "custom",
            "label": "🐳 容器名",
            "query": "mysql, fluent-bit, victoria-logs, grafana, postgres, coredns, nginx, traefik, haproxy, prometheus, alertmanager, node-exporter, kube-state-metrics, redis, cluster-manager, controller, cert-manager",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "⏱️ 日志写入速率",
          "description": "每秒日志条数趋势，突增/突降说明业务波动",
          "type": "timeseries",
          "gridPos": {
            "h": 7,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "datasource": "VictoriaLogs",
          "options": {
            "legend": {
              "calcs": ["max", "last"],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 70,
                "showPoints": "never",
                "spanNulls": false
              },
              "color": {
                "mode": "palette-classic"
              },
              "unit": "cps",
              "min": 0
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": "VictoriaLogs",
              "exprType": "metrics",
              "query": "stats_count | ${search:raw} kubernetes.namespace_name:~${namespace:regex} kubernetes.container_name:~${container:regex}",
              "legendFormat": "日志/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "📋 日志详情",
          "description": "实时日志流，点击任意行展开查看完整字段",
          "type": "logs",
          "gridPos": {
            "h": 20,
            "w": 24,
            "x": 0,
            "y": 7
          },
          "datasource": "VictoriaLogs",
          "options": {
            "showTime": true,
            "showLabels": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none",
            "wrapLogMessage": true,
            "enableLogDetails": true
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "targets": [
            {
              "datasource": "VictoriaLogs",
              "exprType": "logs",
              "query": "${search:raw} kubernetes.namespace_name:~${namespace:regex} kubernetes.container_name:~${container:regex}",
              "refId": "A"
            }
          ]
        }
      ]
    }
