# ── kube-prometheus-stack values ──────────────────────────
# Prometheus Operator + Prometheus + Grafana + AlertManager

# k3s 无独立 etcd/kubeController/kubeScheduler 端点
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false

# 禁用 AlertManager（当前不需要告警）
alertmanager:
  enabled: false

# ── Prometheus ────────────────────────────────────────────
prometheus:
  enabled: true
  prometheusSpec:
    maximumStartupDurationSeconds: 600
    retention: 7d
    serviceMonitorNamespaceSelector: {}
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi

# ── Grafana ───────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: admin
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Asia/Shanghai
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - grafana.czw-sre.internal
    tls:
      - hosts:
          - grafana.czw-sre.internal
        secretName: grafana-tls
  persistence:
    enabled: true
    storageClassName: nfs-client
    size: 5Gi
  grafana.ini:
    server:
      root_url: https://grafana.czw-sre.internal
    auth.anonymous:
      enabled: false
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway:80
      access: proxy
      isDefault: false
