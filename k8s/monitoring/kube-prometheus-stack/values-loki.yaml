# ── Loki values ───────────────────────────────────────────
# SingleBinary 模式 + S3 存储（MinIO）

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  ui:
    enabled: true
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  storage:
    type: s3
    bucketNames:
      chunks: loki
      ruler: loki
    s3:
      endpoint: minio-api.czw-sre.internal
      region: us-east-1
      secretAccessKey: minioadmin
      accessKeyId: minioadmin
      s3ForcePathStyle: true
      insecure: false

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  persistence:
    storageClass: nfs-client
    size: 5Gi

# 禁用内置 MinIO（使用外部 MinIO）
minio:
  enabled: false

# 零化其他组件
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# Gateway ingress
gateway:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - host: loki.czw-sre.internal
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - loki.czw-sre.internal
        secretName: loki-tls
  service:
    type: ClusterIP
