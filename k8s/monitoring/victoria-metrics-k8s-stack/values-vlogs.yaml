# ── VictoriaLogs values ──────────────────────────────────
# 单实例日志存储 + PVC

server:
  enabled: true
  retentionPeriod: 7
  persistentVolume:
    enabled: true
    storageClassName: nfs-client
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: internal-ca
    hosts:
      - name: vm-logs.czw-sre.internal
        path: /
    tls:
      - hosts:
          - vm-logs.czw-sre.internal
        secretName: vm-logs-tls
