apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-override
  namespace: vm-stack
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - access: proxy
        isDefault: true
        name: VictoriaMetrics
        type: prometheus
        uid: VictoriaMetrics
        url: http://vmsingle-victoriametrics-victoria-metrics-k8s-stack.vm-stack.svc.cluster.local.:8428
      - access: proxy
        isDefault: false
        name: VictoriaLogs
        type: loki
        uid: VictoriaLogs
        url: http://victorialogs-victoria-logs-single-server.vm-stack.svc.cluster.local.:9428
