# PostgreSQL HA 外部访问 Service
# 通过 ReadWrite Service 暴露（自动路由到主库）
# NodePort: 30006
apiVersion: v1
kind: Service
metadata:
  name: pg-ha-external
  namespace: postgresql
  labels:
    cnpg.io/cluster: pg-ha
spec:
  type: NodePort
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30006
      protocol: TCP
  selector:
    cnpg.io/cluster: pg-ha
    # CNPG 自动创建 rw 和 ro 两个 Service：
    # - pg-ha-rw: 指向主库（读写）
    # - pg-ha-ro: 指向从库（只读）
    # 外部 Service 通过标签选择器连接到 rw service 的后端
    cnpg.io/podRole: instance
