---
# Redis Standalone CR — v0.25.0 生产配置
#
# 镜像: quay.io/opstree/redis:latest（operator 定制镜像，自动处理密码/配置注入）
#
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis-standalone
spec:
  # ── 安全层 ──
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000

  kubernetesConfig:
    image: quay.io/opstree/redis:latest
    imagePullPolicy: IfNotPresent

    # ── 资源层 ──
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 1Gi
        # cpu: 1000m                # 建议不设 CPU limit

    # ── 密码认证（生产必须）──
    # kubectl create secret generic redis-secret \
    #   --from-literal=password=MyStrongPass2024! -n default
    # redisSecret:
    #   name: redis-secret
    #   key: password

  # ── 监控层 ──
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

  # ── 存储层 ──
  storage:
    volumeClaimTemplate:
      spec:
        # storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

  # ── 保护层（v0.25.0 自动管理 PDB）──
  pdb:
    enabled: true
    minAvailable: 1

  # ── 分布层 ──
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - redis-standalone
          topologyKey: kubernetes.io/hostname

  # ── 拓扑分布（v0.25.0 新增）──
  # topologySpreadConstraints:
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: ScheduleAnyway
  #   labelSelector:
  #     matchLabels:
  #       app: redis-standalone

  # ── 调度层（可选）──
  # priorityClassName: high-priority
  # nodeSelector:
  #   kubernetes.io/hostname: infra-node
  # tolerations:
  # - key: "node-role.kubernetes.io/infra"
  #   operator: "Exists"
