{{- if .Values.replication.enabled }}
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: {{ .Values.replication.name }}
spec:
  clusterSize: {{ .Values.replication.clusterSize }}
  podSecurityContext:
    runAsUser: {{ .Values.replication.podSecurityContext.runAsUser }}
    fsGroup: {{ .Values.replication.podSecurityContext.fsGroup }}
  kubernetesConfig:
    image: "{{ $.Values.redisImage.repository }}:{{ $.Values.redisImage.tag }}"
    imagePullPolicy: {{ $.Values.redisImage.pullPolicy }}
    resources:
      requests:
        cpu: {{ .Values.replication.resources.requests.cpu }}
        memory: {{ .Values.replication.resources.requests.memory }}
      limits:
        memory: {{ .Values.replication.resources.limits.memory }}
  redisExporter:
    enabled: {{ .Values.replication.exporter.enabled }}
    image: "{{ $.Values.redisExporterImage.repository }}:{{ $.Values.redisExporterImage.tag }}"
    imagePullPolicy: {{ $.Values.redisExporterImage.pullPolicy }}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.replication.storage }}
  pdb:
    enabled: {{ .Values.replication.pdb.enabled }}
    minAvailable: {{ .Values.replication.pdb.minAvailable }}
{{- end }}
