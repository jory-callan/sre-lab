apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: redisoperator-v111
  name: redisoperator-v111
  namespace: redis-spotahome-v111
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redisoperator-v111
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: redisoperator-v111
    spec:
      serviceAccountName: redisoperator-v111
      containers:
        - image: quay.io/spotahome/redis-operator:v1.1.1
          imagePullPolicy: IfNotPresent
          name: app
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            limits:
              cpu: 100m
              memory: 50Mi
            requests:
              cpu: 10m
              memory: 50Mi
      restartPolicy: Always