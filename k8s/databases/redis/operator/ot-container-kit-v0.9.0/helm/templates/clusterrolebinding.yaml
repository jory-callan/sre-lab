apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "redis-operator.name" . }}
  labels: {{- include "redis-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "redis-operator.name" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "redis-operator.name" . }}
  namespace: {{ include "redis-operator.namespace" . }}
