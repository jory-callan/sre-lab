# Kite Helm values — v0.13.0
# 自包含 chart，SQLite + NFS 持久化 + ingress-nginx 域名访问 + 自定义配置

image:
  tag: v0.13.0

deploymentStrategy:
  type: Recreate

db:
  type: sqlite
  sqlite:
    persistence:
      pvc:
        enabled: true
        storageClass: nfs-client
        size: 1Gi
      mountPath: /data
    options: "_journal_mode=WAL&_busy_timeout=5000"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
  hosts:
    - host: kite.czw-sre.internal
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - kite.czw-sre.internal
      secretName: kite-tls

service:
  type: ClusterIP

# 自定义配置 — 通过 configmap 注入
config:
  enabled: true
  clusters:
    - name: in-cluster
      inCluster: true
      default: true
