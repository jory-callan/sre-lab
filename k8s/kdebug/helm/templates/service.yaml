apiVersion: v1
kind: Service
metadata:
  name: {{ include "kdebug.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kdebug.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      name: http
  selector:
    {{- include "kdebug.selectorLabels" . | nindent 4 }}
