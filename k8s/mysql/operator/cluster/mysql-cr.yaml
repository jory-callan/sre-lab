# MySQL InnoDB Cluster - PerconaServerMySQL CR（group-replication）
# 由 percona-server-mysql-operator 管理
# 创建 3 节点 MySQL InnoDB Cluster，自动 HAProxy + Router 读写分离
apiVersion: ps.percona.com/v1
kind: PerconaServerMySQL
metadata:
  name: mysql-cluster
  namespace: mysql
  finalizers:
    - percona.com/delete-mysql-pods-in-order
spec:
  crVersion: 1.1.0

  # 引用预定义的 Secret
  secretsName: mysql-cluster-secrets

  # ================================================================
  # MySQL 配置 - 3 节点 InnoDB Cluster
  # ================================================================
  mysql:
    clusterType: group-replication
    size: 3
    autoRecovery: true

    image: percona/percona-server:8.4.8-8.1
    imagePullPolicy: IfNotPresent

    podDisruptionBudget:
      maxUnavailable: 1

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # 持久化 5Gi × 3 个实例
    volumeSpec:
      persistentVolumeClaim:
        resources:
          requests:
            storage: 5Gi

    # 内部 Service（ClusterIP）
    exposePrimary:
      enabled: true
      type: ClusterIP

    affinity:
      antiAffinityTopologyKey: "kubernetes.io/hostname"

    gracePeriod: 600

  # ================================================================
  # Proxy - HAProxy + Router 提供读写分离
  #   HAProxy: 3306(主库读写) / 3307(从库只读)
  #   Router: 自动路由，面向应用
  # ================================================================
  proxy:
    haproxy:
      enabled: true
      size: 3
      image: percona/haproxy:2.8.18-1
      imagePullPolicy: IfNotPresent
      podDisruptionBudget:
        maxUnavailable: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 256Mi
      affinity:
        antiAffinityTopologyKey: "kubernetes.io/hostname"
      gracePeriod: 30

    router:
      enabled: true
      size: 3
      image: percona/percona-mysql-router:8.4.8
      imagePullPolicy: IfNotPresent
      podDisruptionBudget:
        maxUnavailable: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 256Mi
      affinity:
        antiAffinityTopologyKey: "kubernetes.io/hostname"
      gracePeriod: 30

  # ================================================================
  # Toolkit
  # ================================================================
  toolkit:
    image: percona/percona-toolkit:3.7.1
    imagePullPolicy: IfNotPresent

  # ================================================================
  # Backup
  # ================================================================
  backup:
    enabled: false
    image: percona/percona-xtrabackup:8.4.0-5.1

  # ================================================================
  # PMM
  # ================================================================
  pmm:
    enabled: false
    image: percona/pmm-client:3.7.0

  # ================================================================
  # Orchestrator（group-replication 不需要）
  # ================================================================
  orchestrator:
    enabled: false
    image: percona/percona-orchestrator:3.2.6-20
    size: 0
