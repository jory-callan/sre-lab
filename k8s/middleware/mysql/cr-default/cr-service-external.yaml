# MySQL Cluster 外部访问 Service
# 通过 HAProxy Primary 端口暴露，NodePort: 30005
apiVersion: v1
kind: Service
metadata:
  name: mysql-cluster-external
  namespace: mysql
  labels:
    app.kubernetes.io/name: percona-server
    app.kubernetes.io/component: haproxy
    app.kubernetes.io/part-of: mysql-cluster
spec:
  type: NodePort
  ports:
    - name: mysql-primary
      port: 3306
      targetPort: 3306
      nodePort: 30005
      protocol: TCP
  selector:
    app.kubernetes.io/name: percona-server
    app.kubernetes.io/component: haproxy
    app.kubernetes.io/part-of: mysql-cluster
