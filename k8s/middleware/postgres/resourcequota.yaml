# postgres namespace ResourceQuota
# 适配 3 × 4c8g PG 实例 + 2 × pooler
apiVersion: v1
kind: ResourceQuota
metadata:
  name: postgres-quota
  namespace: postgres
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "15"
    pods: "15"
    services: "15"
    secrets: "30"
    configmaps: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: postgres-limits
  namespace: postgres
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      type: Container
