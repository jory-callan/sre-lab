# ──────────────────────────────────────────
# cnpg-cluster — 默认 values
# 适用于 standalone 单节点实例
# HA 实例用 cr-ha/values.yaml 覆盖
# ──────────────────────────────────────────

# ── 超级用户密码管理（false = 手动管理密码，install.sh 中设置）───
enableSuperuserAccess: false

# ── 实例数 ──────────────────────────────────
instances: 1

# ── 镜像 ────────────────────────────────────
imageName: ghcr.io/cloudnative-pg/postgresql:17

# ── PostgreSQL 参数（调优版子集）────────────
postgresql:
  shared_preload_libraries:
    - pg_stat_statements
  parameters:
    max_connections: "200"
    shared_buffers: "1GB"
    effective_cache_size: "3GB"
    work_mem: "8MB"
    maintenance_work_mem: "256MB"
    random_page_cost: "1.1"
    effective_io_concurrency: "200"
    wal_compression: "zstd"
    min_wal_size: "1GB"
    max_wal_size: "4GB"
    statement_timeout: "30000"
    idle_in_transaction_session_timeout: "60000"
    idle_session_timeout: "300000"
    log_min_duration_statement: "1000"
    log_checkpoints: "on"
    log_connections: "on"
    log_disconnections: "on"
    track_io_timing: "on"

# ── 初始化（数据库名、owner、扩展）────────────
initdb:
  database: postgres
  owner: postgres
  password: postgres@czw123
  extensions:
    - citext
    - pg_stat_statements
    - "uuid-ossp"
    - pgcrypto

# ── 存储 ────────────────────────────────────
storage:
  size: 10Gi
  storageClass: nfs-client

walStorage:
  size: 5Gi
  storageClass: nfs-client

# ── 资源 ────────────────────────────────────
resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 4Gi

# ── 认证 Secret（实例部署时已 kubectl apply）──
authSecretName: pg-auth-secret

# ── 外部 Service（默认关闭）──────────────────
externalService:
  enabled: false
  nodePort: 30205

# ── S3 备份凭证 Secret（实例部署时已 kubectl apply）─
s3CredentialsSecretName: pg-s3-creds

# ── S3 备份配置（默认关闭）───────────────────
backup:
  enabled: false
  destinationPath: s3://postgres-backup/
  endpointURL: http://minio.minio.svc:80
  wal:
    compression: gzip
    maxParallel: 8
  data:
    compression: gzip
    immediateCheckpoint: true
    jobs: 4
  retentionPolicy: "30d"

# ── 连接池（默认关闭）───────────────────────
pooler:
  enabled: false
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    default_pool_size: "200"
    max_client_conn: "25000"
    max_db_connections: "500"
    reserve_pool_size: "10"
    reserve_pool_timeout: "5"
    query_timeout: "30"
    idle_transaction_timeout: "60"
    server_idle_timeout: "300"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── 定时备份（默认关闭）─────────────────────
scheduledBackup:
  enabled: false
  schedule: "0 0 3 * * ?"

# ── 亲和性 ──────────────────────────────────
affinity:
  topologyKey: kubernetes.io/hostname
