# PostgreSQL HA — CNPG Cluster CR（生产调优版）
# 3 节点 HA，4c8g 规格，ssd 优化，wbouncer 连接池 50000 并发
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-ha
  namespace: postgres
spec:
  # ── 实例数（HA = 3，一主二从）───────────────────
  instances: 3

  # ── 同步复制 ────────────────────────────────────
  minSyncReplicas: 1
  maxSyncReplicas: 2

  imageName: ghcr.io/cloudnative-pg/postgresql:17

  # ── PostgreSQL 参数 ─────────────────────────────
  # 以下参数对应 4c8g 规格 + ssd 存储 + 50000 并发客户端
  # 调优依据见 tuning-guide.md
  postgresql:
    # shared_preload_libraries 是顶层字段，不在 parameters 内
    shared_preload_libraries:
      - pg_stat_statements
    parameters:
      # ── 连接 ──────────────────────────────────
      # PG 后端连接上限（50000 客户端通过 PgBouncer 复用）
      # 详见 tuning-guide.md#61
      max_connections: "500"
      superuser_reserved_connections: "10"

      # ── 内存（8Gi 总量）────────────────────────
      shared_buffers: "2GB"            # 25% 物理内存
      effective_cache_size: "6GB"      # 75%，优化器缓存判断
      work_mem: "16MB"                 # 排序/哈希，500 并发 ≈ 8GB
      maintenance_work_mem: "512MB"    # 维护操作（vacuum/index）
      wal_buffers: "16MB"              # WAL 缓冲

      # ── 存储 / ssd 优化 ───────────────────────
      random_page_cost: "1.1"          # ssd（hdd 默认 4.0）
      effective_io_concurrency: "200"  # ssd 队列深度
      wal_compression: "zstd"          # wal I/O 减少 60-80%
      wal_log_hints: "on"              # pg_rewind 修复裂脑

      # ── WAL / Checkpoint ────────────────────
      # max_wal_size 须小于 WAL 卷容量（5Gi），留出 ~40% 安全余量
      min_wal_size: "1GB"
      max_wal_size: "3GB"
      checkpoint_timeout: "900"        # 15min
      checkpoint_completion_target: "0.9"

      # ── 超时保护 ───────────────────────────
      statement_timeout: "30000"       # 30s，防慢 sql 挂死
      idle_in_transaction_session_timeout: "60000"  # 60s，防悬挂事务
      idle_session_timeout: "300000"   # 5min，防死连接
      tcp_keepalives_idle: "60"
      tcp_keepalives_interval: "10"
      tcp_keepalives_count: "6"

      # ── 自动清理 ──────────────────────────
      autovacuum_max_workers: "4"
      autovacuum_naptime: "30s"
      autovacuum_vacuum_scale_factor: "0.01"
      autovacuum_analyze_scale_factor: "0.005"

      # ── 日志 / 审计 ──────────────────────
      log_min_duration_statement: "1000"  # 1s 以上记录
      log_checkpoints: "on"
      log_connections: "on"
      log_disconnections: "on"
      log_lock_waits: "on"
      deadlock_timeout: "5s"

      # ── 并行查询 ─────────────────────────
      max_parallel_workers: "8"
      max_parallel_workers_per_gather: "4"
      parallel_setup_cost: "100"
      parallel_tuple_cost: "0.01"

      # ── 监控 ──────────────────────────────
      track_io_timing: "on"
      track_functions: "pl"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: "all"

      # — CNPG 自动管理以下参数 —
      # wal_level: logical
      # hot_standby: on
      # max_wal_senders: 10 → 自动调整
      # max_replication_slots: 32
      # hot_standby_feedback: on

  # ── 初始化配置 ──────────────────────────────────
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: pg-auth-secret
      postInitSQL:
        # pg_stat_statements 需 shared_preload_libraries 配合
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements
      postInitTemplateSQL:
        # 可用扩展列表见 tuning-guide.md
        # pg_cron / pg_partman 需自定义镜像（见 custom-image/）
        - CREATE EXTENSION IF NOT EXISTS citext
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
        - CREATE EXTENSION IF NOT EXISTS pgcrypto

  # ── 存储 ──────────────────────────────────────
  storage:
    size: 10Gi
    storageClass: local-path

  # WAL 独立存储（减少 I/O 争抢）
  walStorage:
    size: 5Gi
    storageClass: local-path

  # ── 资源限制（4c8g）───────────────────────────
  # memory request 须 ≥ shared_buffers（2GB）
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 4
      memory: 8Gi

  # ── s3 备份（Minio）─────────────────────────
  backup:
    barmanObjectStore:
      destinationPath: s3://postgres-backup/
      endpointURL: http://minio.minio.svc:80
      s3Credentials:
        accessKeyId:
          name: pg-s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-s3-creds
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 8
      data:
        compression: gzip
        immediateCheckpoint: true
        jobs: 4
    retentionPolicy: "30d"

  # ── 亲和性（空 tolerations 避免 CNPG 无限滚动重建）──
  affinity:
    topologyKey: kubernetes.io/hostname
