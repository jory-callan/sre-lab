# PodMonitor — PostgreSQL HA 集群指标采集
# 替代 CNPG 内置的 enablePodMonitor（1.29+ 已废弃）
# VMAgent 通过 selectAllByDefault: true 自动发现此资源
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: pg-ha
  namespace: postgres
  labels:
    app.kubernetes.io/name: cloudnative-pg
    release: prometheus  # kube-prometheus-stack 兼容标签
spec:
  podMetricsEndpoints:
    - port: metrics
      interval: 15s
      scrapeTimeout: 10s
  selector:
    matchLabels:
      cnpg.io/cluster: pg-ha
