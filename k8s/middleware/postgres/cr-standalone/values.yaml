# ──────────────────────────────────────────
# PostgreSQL Standalone 实例配置 — cr-standalone
# 单节点，无 Pooler，卷快照备份
# ──────────────────────────────────────────

# ── 超级用户密码管理（false = 手动管理密码，install.sh 中设置）───
enableSuperuserAccess: false

# ── 实例 ──────────────────────────────────
instances: 1
imageName: ghcr.io/cloudnative-pg/postgresql:17

# ── PostgreSQL 参数（2c4g 调优版子集）──────
postgresql:
  shared_preload_libraries:
    - pg_stat_statements
  parameters:
    max_connections: "200"
    shared_buffers: "1GB"
    effective_cache_size: "3GB"
    work_mem: "8MB"
    maintenance_work_mem: "256MB"
    random_page_cost: "1.1"
    effective_io_concurrency: "200"
    wal_compression: "zstd"
    min_wal_size: "1GB"
    max_wal_size: "4GB"
    statement_timeout: "30000"
    idle_in_transaction_session_timeout: "60000"
    idle_session_timeout: "300000"
    log_min_duration_statement: "1000"
    log_checkpoints: "on"
    log_connections: "on"
    log_disconnections: "on"
    track_io_timing: "on"

# ── 初始化 ────────────────────────────────
initdb:
  database: postgres
  owner: postgres
  password: postgres@czw123
  extensions:
    - citext
    - pg_stat_statements
    - "uuid-ossp"
    - pgcrypto

# ── 存储（nfs-client）─────────────────────
storage:
  size: 10Gi
  storageClass: nfs-client

walStorage:
  size: 5Gi
  storageClass: nfs-client

# ── 资源（2c4g）───────────────────────────
resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 4Gi

# ── S3 备份（关闭，使用 volume snapshot）───
backup:
  enabled: false

# ── 连接池（关闭）─────────────────────────
pooler:
  enabled: false

# ── 定时备份（关闭）───────────────────────
scheduledBackup:
  enabled: false

# ── 外部 Service ─────────────────────────
externalService:
  enabled: true
  nodePort: 30205
