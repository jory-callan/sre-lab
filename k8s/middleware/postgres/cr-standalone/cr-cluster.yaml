# PostgreSQL Standalone — CNPG Cluster CR
# 单节点 PostgreSQL 17 实例（与 HA 共享 pg-auth-secret）
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-standalone
  namespace: postgres
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:17

  # ── PostgreSQL 参数（调优版子集）───────────────
  postgresql:
    shared_preload_libraries:
      - pg_stat_statements
    parameters:
      max_connections: "200"
      shared_buffers: "1GB"
      effective_cache_size: "3GB"
      work_mem: "8MB"
      maintenance_work_mem: "256MB"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      wal_compression: "zstd"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      statement_timeout: "30000"
      idle_in_transaction_session_timeout: "60000"
      idle_session_timeout: "300000"
      log_min_duration_statement: "1000"
      log_checkpoints: "on"
      log_connections: "on"
      log_disconnections: "on"
      track_io_timing: "on"

  # ── 初始化配置（与 pg-auth-secret 一致）─────────
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: pg-auth-secret
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements
      postInitTemplateSQL:
        - CREATE EXTENSION IF NOT EXISTS citext
        - CREATE EXTENSION IF NOT EXISTS pg_stat_statements
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
        - CREATE EXTENSION IF NOT EXISTS pgcrypto

  # ── 存储────────────────────────────────────────
  storage:
    size: 10Gi
    storageClass: nfs-client

  walStorage:
    size: 5Gi
    storageClass: nfs-client

  # ── 资源限制（2c4g）───────────────────────────
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

  # ── 备份（volume snapshot，需配置 storage class）
  backup:
    volumeSnapshot:
      className: ~
