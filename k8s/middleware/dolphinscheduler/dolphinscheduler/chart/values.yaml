# Default values for dolphinscheduler chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

timezone: "Asia/Shanghai"

image:
  registry: "192.168.5.103:5000"
  tag: "3.1.7"
  pullPolicy: "IfNotPresent"
  pullSecret: ""
  master: apache/dolphinscheduler-master
  worker: apache/dolphinscheduler-worker
  api: apache/dolphinscheduler-api
  alert: apache/dolphinscheduler-alert-server
  tools: apache/dolphinscheduler-tools

# External database (required, postgresql.enabled=false)
externalDatabase:
  type: "postgresql"
  host: "pg-ha-rw.postgres.svc"
  port: "5432"
  username: "postgres"
  password: "postgres123"
  database: "dolphinscheduler"
  params: "characterEncoding=utf8"

# ZooKeeper registry connection string
zookeeper:
  quorum: "ds-zookeeper.dolphinscheduler.svc:2181"

# Common config
conf:
  common:
    data.basedir.path: /tmp/dolphinscheduler
    resource.storage.type: NONE
    datasource.encryption.enable: false
    support.hive.oneSession: false
    sudo.enable: true
    development.state: false
    alert.rpc.port: 50052

# Common env vars (exposed via configmap)
common:
  configmap:
    DATA_BASEDIR_PATH: "/tmp/dolphinscheduler"
    RESOURCE_UPLOAD_PATH: "/dolphinscheduler"
    PYTHON_HOME: "/usr/bin/python"
    JAVA_HOME: "/opt/java/openjdk"

# ===== Master =====
master:
  replicas: 1
  podManagementPolicy: "Parallel"
  resources:
    limits:
      memory: "1Gi"
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  terminationGracePeriodSeconds: 30
  env:
    JAVA_OPTS: "-Xms256m -Xmx512m -Xmn128m"
    MASTER_EXEC_THREADS: "20"
    MASTER_EXEC_TASK_NUM: "10"
    MASTER_DISPATCH_TASK_NUM: "3"
    MASTER_HOST_SELECTOR: "LowerWeight"
    MASTER_HEARTBEAT_INTERVAL: "10s"
    MASTER_HEARTBEAT_ERROR_THRESHOLD: "5"
    MASTER_TASK_COMMIT_RETRYTIMES: "5"
    MASTER_TASK_COMMIT_INTERVAL: "1s"
    MASTER_STATE_WHEEL_INTERVAL: "5s"
    MASTER_MAX_CPU_LOAD_AVG: "-1"
    MASTER_RESERVED_MEMORY: "0.3"
  persistence:
    enabled: false
    size: "10Gi"
    storageClass: "nfs-client"
    accessModes: ["ReadWriteOnce"]

# ===== Worker =====
worker:
  replicas: 1
  podManagementPolicy: "Parallel"
  resources:
    limits:
      memory: "2Gi"
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  terminationGracePeriodSeconds: 30
  env:
    WORKER_MAX_CPU_LOAD_AVG: "-1"
    WORKER_RESERVED_MEMORY: "0.3"
    WORKER_EXEC_THREADS: "20"
    WORKER_HEARTBEAT_INTERVAL: "10s"
    WORKER_HEART_ERROR_THRESHOLD: "5"
    WORKER_HOST_WEIGHT: "100"
  persistence:
    enabled: true
    data:
      enabled: false
      size: "20Gi"
      storageClass: "nfs-client"
      accessModes: ["ReadWriteOnce"]
    logs:
      enabled: true
      size: "10Gi"
      storageClass: "nfs-client"
      accessModes: ["ReadWriteOnce"]

# ===== API =====
api:
  replicas: 1
  resources:
    limits:
      memory: "1Gi"
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  terminationGracePeriodSeconds: 30
  env:
    JAVA_OPTS: "-Xms128m -Xmx256m -Xmn64m"
  service:
    type: "ClusterIP"
    nodePort: ""
  persistence:
    enabled: false
    size: "10Gi"
    storageClass: "nfs-client"
    accessModes: ["ReadWriteOnce"]

# ===== Alert =====
alert:
  replicas: 1
  resources:
    limits:
      memory: "512Mi"
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  terminationGracePeriodSeconds: 30
  env:
    JAVA_OPTS: "-Xms128m -Xmx256m -Xmn64m"
  persistence:
    enabled: false
    size: "10Gi"
    storageClass: "nfs-client"
    accessModes: ["ReadWriteOnce"]

# ===== Ingress =====
ingress:
  enabled: false
  host: "ds.czw-sre.internal"
  path: "/dolphinscheduler"
  annotations: {}
  tls:
    enabled: false
    secretName: ""

# ===== ServiceMonitor =====
serviceMonitor:
  enabled: true
  interval: 30s
  labels:
    release: kube-prometheus-stack
