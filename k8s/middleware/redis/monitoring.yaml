# Redis 监控采集
# redis-operator 会自动创建 Service，暴露 exporter 指标
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis
  namespace: middleware
  labels:
    app.kubernetes.io/name: redis
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  namespaceSelector:
    matchNames:
      - middleware
  endpoints:
    - port: redis-exporter
      interval: 30s
    - port: metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-sentinel
  namespace: middleware
  labels:
    app.kubernetes.io/name: redis-sentinel
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-sentinel
  namespaceSelector:
    matchNames:
      - middleware
  endpoints:
    - port: metrics
      interval: 30s
