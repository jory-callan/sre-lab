# act_runner - Gitea Actions Runner
# Deployment + PVC (持久化 .runner 注册文件，pod 重启免重新注册)
---
apiVersion: v1
kind: Namespace
metadata:
  name: gitea-runner
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-runner
  namespace: gitea-runner
type: Opaque
stringData:
  # ── 替换为实际 registration token ──
  # 获取方式:
  #   curl -sk -X POST -H "Authorization: token <gitea-admin-token>" \
  #     "http://gitea-http.gitea:3000/api/v1/admin/actions/runners/registration-token"
  token: "Shxm70Ujl4o0jz27WHEzR39zijWGuyNyvtRONE1v"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-runner-config
  namespace: gitea-runner
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: /runner-data/.runner
      capacity: 2
    container:
      network_mode: host
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-runner
  namespace: gitea-runner
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner
  namespace: gitea-runner
  labels:
    app: gitea-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-runner
  template:
    metadata:
      labels:
        app: gitea-runner
    spec:
      containers:
        - name: runner
          image: gitea/act_runner:0.3.1
          imagePullPolicy: IfNotPresent
          env:
            # 集群内 Service 地址，不走 ingress（避免 TLS 证书问题）
            - name: GITEA_INSTANCE_URL
              value: "http://gitea-http.gitea:3000"
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-runner
                  key: token
            - name: GITEA_RUNNER_NAME
              value: "k8s-runner-1"
            # labels 决定 workflow 中 runs-on 的取值
            # 指向预装工具的 runner-base 镜像
            - name: GITEA_RUNNER_LABELS
              value: "ubuntu-latest:docker://192.168.5.103:5001/admin/runner-base:latest,ubuntu-24.04:docker://192.168.5.103:5001/admin/runner-base:latest"
            - name: CONFIG_FILE
              value: /runner/config.yaml
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
            - name: runner-config
              mountPath: /runner/config.yaml
              subPath: config.yaml
            - name: runner-data
              mountPath: /runner-data
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: runner-config
          configMap:
            name: gitea-runner-config
        - name: runner-data
          persistentVolumeClaim:
            claimName: gitea-runner
