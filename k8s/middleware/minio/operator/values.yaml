# operator values — MinIO Operator v5.0.18
# 覆盖 chart 默认值
operator:
  image:
    tag: v5.0.18
  resources:
    # ──────────────────────────────────────────
    # 当前环境最低配置（仅 memory，CPU 不做限制）:
    requests:
      memory: 64Mi
    limits:
      memory: 128Mi

# Console 跟随 operator 版本
console:
  image:
    tag: v5.0.18
  resources:
    # ──────────────────────────────────────────
    # 当前环境最低配置（仅 memory，CPU 不做限制）:
    requests:
      memory: 128Mi
    limits:
      memory: 256Mi
  ingress:
    enabled: false  # 我们用独立 Ingress，不走 console 内置
