apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
spec:
  # ── quay.io 镜像（版本锁定，不再主动升级）────
  image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
  imagePullPolicy: IfNotPresent

  # 使用 configuration.name 引用 config.env 格式的 Secret
  configuration:
    name: minio-env-config

  # ── 环境变量 ─────────────────────────────────
  env:
    - name: MINIO_PROMETHEUS_AUTH_TYPE
      value: "public"
    - name: MINIO_STORAGE_CLASS_STANDARD
      value: "EC:0"
    - name: MINIO_STORAGE_CLASS_RRS
      value: "EC:0"

  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 4
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
      # ── 容器资源限制 ────────────────────────────
      resources:
        # ──────────────────────────────────────────
        # 生产推荐值:
        #   requests:
        #     cpu: 500m
        #     memory: 1Gi
        #   limits:
        #     cpu: 2000m
        #     memory: 4Gi
        # ──────────────────────────────────────────
        # 当前环境最低配置（仅 limits）:
        limits:
          cpu: 1000m
          memory: 1Gi

  mountPath: /export
  subPath: /data
  requestAutoCert: false
  podManagementPolicy: OrderedReady

  # ── 默认桶 ─────────────────────────────────────
  buckets:
    - name: public
      region: us-east-1
    - name: private
      region: us-east-1
    - name: velero
      region: us-east-1
    - name: vm-metrics
      region: us-east-1
    - name: vm-logs
      region: us-east-1
    - name: postgres-backup
      region: us-east-1

  # ── 预置用户 ─────────────────────────────────────
  users:
    - name: svc-poweruser
    - name: svc-private
