# ci-deployer - CI/CD 部署专用 ServiceAccount
# 集群级，所有项目的 workflow 共用此 SA 部署
# token 存到 Gitea Secret KUBE_TOKEN
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ci-deployer
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/log", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ci-deployer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ci-deployer
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: kube-system
---
apiVersion: v1
kind: Secret
metadata:
  name: ci-deployer-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: ci-deployer
type: kubernetes.io/service-account-token
