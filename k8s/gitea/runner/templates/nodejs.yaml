# Node.js 项目 CI/CD 模板
# 使用方式：复制到项目 .gitea/workflows/build.yaml，修改 env 中的 IMAGE 和 NAMESPACE
#
# 前置条件：
# - Gitea Secrets 已设置 REGISTRYTOKEN、KUBE_TOKEN
# - ci-deployer SA 已部署 (sre-lab/k8s/gitea/runner/install.sh)
# - 项目 deploy/ 目录有扁平 yaml (namespace/secret/deployment/service/ingress)
# - deployment.yaml 中 image 用 ${IMAGE}，checksum/config 用 ${CONFIG_HASH}
# - secret.yaml 中敏感值用 ${VAR} 占位符，通过 Gitea Secrets 注入 (envsubst 替换)
# - 项目根目录有 Dockerfile (多阶段构建，不 COPY 配置文件)

name: Build and Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: 192.168.5.103:5001
  IMAGE: 192.168.5.103:5001/admin/<your-project>
  NAMESPACE: <your-namespace>
  K8S_API: https://192.168.5.107:6443
  GITEA_URL: http://192.168.5.107:30021

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 --branch "${{ gitea.ref_name }}" \
            "${{ env.GITEA_URL }}/admin/<your-project>.git" /tmp/repo
          cp -a /tmp/repo/. .

      - name: Build and Push Docker Image
        run: |
          TAG="${{ gitea.ref_name }}"
          echo "${{ secrets.REGISTRYTOKEN }}" | docker login $REGISTRY -u admin --password-stdin
          docker build -t "${IMAGE}:${TAG}" .
          docker push "${IMAGE}:${TAG}"

      - name: Render Manifests
        run: |
          TAG="${{ gitea.ref_name }}"
          IMAGE="${IMAGE}:${TAG}"
          export IMAGE
          # 1. 先渲染 secret (若含 ${DB_DSN} 等敏感占位符，env 注入后替换)
          envsubst < deploy/secret.yaml > /tmp/secret.yaml
          # 2. 从渲染后的 secret 计算 hash (配置/密码变更均触发滚动更新)
          CONFIG_HASH=$(sha256sum /tmp/secret.yaml | awk '{print $1}')
          export CONFIG_HASH
          # 3. 渲染其余 yaml (deployment.yaml 需要 ${IMAGE} + ${CONFIG_HASH})
          for f in deploy/*.yaml; do
            [ "$(basename $f)" = "secret.yaml" ] && continue
            envsubst < "$f" > "/tmp/$(basename $f)"
          done

      - name: Deploy to K8s
        env:
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
        run: |
          cat > /tmp/kubeconfig << EOF
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: ${K8S_API}
              insecure-skip-tls-verify: true
            name: k3s
          contexts:
          - context:
              cluster: k3s
              user: ci-deployer
            name: k3s
          current-context: k3s
          users:
          - name: ci-deployer
            user:
              token: ${KUBE_TOKEN}
          EOF

          kubectl --kubeconfig=/tmp/kubeconfig apply -f /tmp/namespace.yaml
          kubectl --kubeconfig=/tmp/kubeconfig apply -f /tmp/secret.yaml
          kubectl --kubeconfig=/tmp/kubeconfig apply -f /tmp/deployment.yaml
          kubectl --kubeconfig=/tmp/kubeconfig apply -f /tmp/service.yaml
          kubectl --kubeconfig=/tmp/kubeconfig apply -f /tmp/ingress.yaml

      - name: Health Check
        run: |
          kubectl --kubeconfig=/tmp/kubeconfig -n $NAMESPACE \
            rollout status deploy/<your-deployment> --timeout=120s
