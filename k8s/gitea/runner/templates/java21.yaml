# Java 21 + Maven 项目 CI/CD 模板
# 使用方式：复制到项目 .gitea/workflows/build.yaml，按需修改
#
# 前置条件：
# - Gitea Secrets 已设置 REGISTRYTOKEN、KUBE_TOKEN
# - K8s 命名空间已创建 ci-deployer ServiceAccount
# - 项目根目录有 Dockerfile（多阶段构建推荐，如 maven:3-eclipse-temurin-21-alpine → eclipse-temurin:21-jre-alpine）

name: Build and Deploy

on:
  push:
    tags:
      - '*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          apk add --no-cache docker-cli curl
          curl -sLO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && mv kubectl /usr/local/bin/

      - name: Login to Gitea Container Registry
        run: echo "${{ secrets.REGISTRYTOKEN }}" | docker login gitea.czw-sre.internal -u admin --password-stdin

      - name: Build and Push Docker image
        run: |
          TAG="${{ github.ref_name }}"
          # ── 修改为你的镜像名 ──
          IMAGE="gitea.czw-sre.internal/admin/<your-project>:${TAG}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          docker tag "${IMAGE}" "gitea.czw-sre.internal/admin/<your-project>:latest"
          docker push "gitea.czw-sre.internal/admin/<your-project>:latest"

      - name: Deploy to K8s
        env:
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          IMAGE="gitea.czw-sre.internal/admin/<your-project>:${TAG}"

          cat > /tmp/kubeconfig << EOF
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://kubernetes.default.svc:443
              insecure-skip-tls-verify: true
            name: k3s
          contexts:
          - context:
              cluster: k3s
              user: ci-deployer
            name: k3s
          current-context: k3s
          users:
          - name: ci-deployer
            user:
              token: ${KUBE_TOKEN}
          EOF

          # ── 修改为你的命名空间和 Deployment 名 ──
          kubectl --kubeconfig=/tmp/kubeconfig create namespace <your-namespace> --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

          kubectl --kubeconfig=/tmp/kubeconfig set image -n <your-namespace> deploy/<your-deployment> \
            "<your-container>=${IMAGE}" --record 2>/dev/null || \
          kubectl --kubeconfig=/tmp/kubeconfig apply -f - << YAML
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: <your-deployment>
            namespace: <your-namespace>
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: <your-app>
            template:
              metadata:
                labels:
                  app: <your-app>
              spec:
                containers:
                  - name: <your-container>
                    image: ${IMAGE}
                    ports:
                      - containerPort: 8080
                    resources:
                      limits:
                        cpu: 500m
                        memory: 512Mi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: <your-service>
            namespace: <your-namespace>
          spec:
            ports:
              - port: 8080
                targetPort: 8080
            selector:
              app: <your-app>
          YAML
