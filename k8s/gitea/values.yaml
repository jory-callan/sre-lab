# values.yaml — Gitea 1.26.4
# SQLite + NFS + ingress-nginx
# 默认管理员: admin / admin123
---
image:
  registry: ""
  repository: gitea/gitea
  tag: 1.26.4
  pullPolicy: IfNotPresent

# Service — HTTP + SSH NodePort 暴露
service:
  http:
    type: NodePort
    port: 3000
    nodePort: 30021
    clusterIP: ""
  ssh:
    type: NodePort
    port: 22
    nodePort: 30022
    clusterIP: ""

# 持久化（NFS RWX）
persistence:
  enabled: true
  storageClass: nfs-client
  size: 10Gi
  accessModes:
    - ReadWriteMany

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations: {}
  # 如需 HTTPS（需 cert-manager），取消注释：
  # annotations:
  #   cert-manager.io/cluster-issuer: internal-ca
  hosts:
    - host: gitea.czw-sre.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # tls:
  #   - hosts:
  #       - gitea.czw-sre.internal
  #     secretName: gitea-tls

# ── 管理员预配置 ──────────────────────────────────
gitea:
  admin:
    username: admin
    password: Admin@czw123
    email: admin@gitea.local

  config:
    server:
      DOMAIN: gitea.czw-sre.internal
      ROOT_URL: https://gitea.czw-sre.internal
      HTTP_PORT: 3000
      PROTOCOL: http
      OFFLINE_MODE: false
      DISABLE_SSH: false
      START_SSH_SERVER: true
      SSH_DOMAIN: gitea.czw-sre.internal
      LFS_START_SERVER: true
    database:
      DB_TYPE: sqlite3
      PATH: /data/gitea.db
    session:
      PROVIDER: file
    security:
      INSTALL_LOCK: true              # 预配置管理员后锁定安装页面
      PASSWORD_COMPLEXITY: off
    service:
      DISABLE_REGISTRATION: false     # 允许注册
      REQUIRE_SIGNIN_VIEW: false
    metrics:
      ENABLED: true                    # 开启 /metrics（给 VMAgent 采集）

# 子图表禁用（SQLite + 文件 session，无需外部 DB/缓存）
postgresql:
  enabled: false
postgresql-ha:
  enabled: false
valkey-cluster:
  enabled: false
valkey:
  enabled: false
memcached:
  enabled: false

# 单副本
replicaCount: 1

# 资源限制
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# 启动探针（Gitea 首次启动较慢）
startupProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 30
