apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: temporal-simple-mysql-pvc
  namespace: temporal-simple
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-simple-mysql
  namespace: temporal-simple
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-simple-mysql
  template:
    metadata:
      labels:
        app: temporal-simple-mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.4
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: temporal123
        - name: MYSQL_USER
          value: temporal
        - name: MYSQL_PASSWORD
          value: temporal123
        - name: MYSQL_DATABASE
          value: temporal
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: temporal-simple-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-simple-mysql
  namespace: temporal-simple
spec:
  selector:
    app: temporal-simple-mysql
  ports:
  - port: 3306
    targetPort: 3306
