apiVersion: v1
kind: Service
metadata:
  name: {{ include "st.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "st.fullname" . }}
    {{- include "st.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "st.fullname" . }}
  ports:
    - name: engine-api
      port: {{ .Values.service.engineApiPort }}
      targetPort: engine-api
