apiVersion: v1
kind: Service
metadata:
  name: {{ include "ds.name" . }}-alert
  labels:
    {{- include "ds.componentLabels" (dict "context" $ "component" "alert") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 50052
      targetPort: alert-port
      protocol: TCP
      name: alert-port
    - port: 50053
      targetPort: actuator-port
      protocol: TCP
      name: actuator-port
  selector:
    {{- include "ds.componentSelector" (dict "context" $ "component" "alert") | nindent 4 }}
