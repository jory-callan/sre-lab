# test-default values — kdebug 测试实例
# 覆盖 chart 默认值
---
replicaCount: 2

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
  host: kdebug.czw-sre.internal
  tls:
    enabled: true
    secretName: kdebug-tls

# NodePort
nodePort:
  enabled: true
  port: 30302

# HPA
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# PDB
pdb:
  enabled: true
  minAvailable: 1

# 反亲和
podAntiAffinity:
  enabled: true
  topologyKey: kubernetes.io/hostname

# 命名空间配额
resourceQuota:
  enabled: true
  quota:
    requests.cpu: "500m"
    requests.memory: "512Mi"
    limits.cpu: "1000m"
    limits.memory: "1Gi"
    pods: "10"
  limitRange:
    default:
      cpu: 200m
      memory: 128Mi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    max:
      cpu: 500m
      memory: 256Mi
