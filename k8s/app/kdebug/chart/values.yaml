# chart 默认 values — kdebug
# 实例覆盖在 test-default/values.yaml
---
replicaCount: 1

image:
  repository: ghcr.io/jory-callan/kdebug
  tag: v1.0.2
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  port: 80
  targetPort: 8080

resources:
  # ──────────────────────────────────────────
  # 生产推荐值:
  #   requests:
  #     cpu: 100m
  #     memory: 64Mi
  #   limits:
  #     cpu: 200m
  #     memory: 128Mi
  # ──────────────────────────────────────────
  # 当前环境最低配置（requests.memory + limits.memory 必配，CPU 不做限制）:
  requests:
    memory: 32Mi
  limits:
    memory: 128Mi
