# ═══════════════════════════════════════════════
# 通用有状态应用 Helm Chart — values.yaml
# ═══════════════════════════════════════════════
# 所有配置项分 5 层覆盖：
#   global      → 全局覆盖（name / namespace / labels）
#   app         → 应用核心（镜像、命令、端口）
#   storage     → 存储（PVC）
#   config      → 配置（ConfigMap / Secret / Env）
#   platform    → 平台层（Service / PDB / 调度策略）
# ═══════════════════════════════════════════════

# ─── global ────────────────────────────────────
global:
  # 全局名称覆盖。空值时自动从 release name 推断
  nameOverride: ""
  # 全局命名空间覆盖。空值时使用 helm install 的 --namespace
  namespaceOverride: ""
  # 附加全局标签（注入到所有资源）
  labels: {}

# ─── app ───────────────────────────────────────
# 应用核心配置

# 副本数。有状态应用推荐固定为 1（配合 RWO PVC 防误扩）
replicaCount: 1

image:
  repository: redis
  tag: 7.0-alpine
  pullPolicy: IfNotPresent

# 容器启动命令。非空时替换镜像默认 entrypoint
# 空值 [] 表示使用镜像自带 entrypoint
command:
  - redis-server

# 容器启动参数。拼接在 command 之后
args:
  - /etc/redis/redis.conf
  - --requirepass
  - $(APP_PASSWORD)

# 工作目录（默认从镜像继承）
workingDir: ""

# 端口声明（用于 Service 和探针）
ports:
  - name: app
    containerPort: 6379
    protocol: TCP

# ─── storage ────────────────────────────────────
storage:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  storageClass: "nfs-storage"
  # 已有 PVC 名称。非空时跳过创建 PVC（共享已有）
  existingClaim: ""
  # 挂载路径
  mountPath: /data
  # 子路径。空值表示挂载整个卷
  subPath: ""

# ─── config ────────────────────────────────────
# 配置注入方式：ConfigMap 文件挂载 + Secret 环境变量

config:
  # ConfigMap 挂载路径。空值表示不挂载 ConfigMap
  mountPath: /etc/redis
  # 文件名和内容列表。key=文件名, value=文件内容
  # 当 mountPath 非空时挂载到 {mountPath}/{key}
  files:
    redis.conf: |
      # Redis 配置文件
      # 密码通过环境变量 APP_PASSWORD 注入
      # 更多配置请参考 https://redis.io/docs/management/config/

      # 持久化
      appendonly yes
      appendfsync everysec

      # RDB 快照
      save 3600 1
      save 300 100
      save 60 10000

      # 内存管理
      maxmemory 256mb
      maxmemory-policy noeviction

      # 网络
      bind 0.0.0.0
      protected-mode no
      port 6379

      # 日志
      loglevel notice

# ─── auth ──────────────────────────────────────
# 认证信息。通过 Secret + 环境变量注入

auth:
  # 是否启用认证。false 时不创建 Secret，不注入密码
  enabled: true

  # 已有 Secret 名称。非空时跳过创建 Secret
  existingSecret: ""

  # Secret 中的密码字段名
  passwordKey: password

  # 注入到容器的环境变量名
  envName: APP_PASSWORD

  # 密码值（仅新建 Secret 时使用）
  # 安全建议：生产环境使用 helm install --set auth.password=$(openssl rand -base16 16)
  password: "redis@czw"

# 附加环境变量（除密码外）
extraEnv:
  - name: TZ
    value: Asia/Shanghai

# ─── platform ──────────────────────────────────
# 平台层配置

service:
  enabled: true
  type: NodePort
  clusterIP: ""
  ports:
    - name: app
      port: 6379
      targetPort: app
      nodePort: 30202
  annotations: {}

probes:
  enabled: true
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

pdb:
  enabled: true
  maxUnavailable: 1
  minAvailable: ""

# 调度策略
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/instance
            operator: In
            values:
            - "{{ include \"app.name\" . }}"
        topologyKey: kubernetes.io/hostname

# 标签/注解
labels: {}
annotations: {}

# Pod 安全策略
podSecurityContext: {}
  # runAsUser: 1000
  # runAsGroup: 1000
  # fsGroup: 1000

containerSecurityContext: {}
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true

# 更新策略
updateStrategy:
  type: RollingUpdate

# Pod 优雅停止时间
terminationGracePeriodSeconds: 30