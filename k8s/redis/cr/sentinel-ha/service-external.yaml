---
# 外部访问 Service — NodePort 30207
apiVersion: v1
kind: Service
metadata:
  name: redis-core-external
  namespace: redis
spec:
  type: NodePort
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: 30207
  selector:
    app.kubernetes.io/component: redis
    app.kubernetes.io/name: redis-core
    app.kubernetes.io/part-of: redis-failover
    redisfailovers-role: master
