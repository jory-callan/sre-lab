{{- if .Values.cluster.enabled }}
---
apiVersion: redis.redis.opstreelabs.in/v1beta1
kind: RedisCluster
metadata:
  name: {{ .Values.cluster.name }}
spec:
  clusterSize: {{ .Values.cluster.clusterSize }}
  kubernetesConfig:
    image: "{{ $.Values.redisImage.repository }}:{{ $.Values.redisImage.tag }}"
    imagePullPolicy: {{ $.Values.redisImage.pullPolicy }}
    resources:
      requests:
        cpu: {{ .Values.cluster.resources.requests.cpu }}
        memory: {{ .Values.cluster.resources.requests.memory }}
      limits:
        memory: {{ .Values.cluster.resources.limits.memory }}
    {{- if .Values.cluster.redisSecret }}
    redisSecret:
      name: {{ .Values.cluster.redisSecret.name }}
      key: {{ .Values.cluster.redisSecret.key }}
    {{- end }}
  redisExporter:
    enabled: {{ .Values.cluster.exporter.enabled }}
    image: "{{ $.Values.redisExporterImage.repository }}:{{ $.Values.redisExporterImage.tag }}"
    imagePullPolicy: {{ $.Values.redisExporterImage.pullPolicy }}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  securityContext:
    runAsUser: {{ .Values.cluster.securityContext.runAsUser }}
    runAsGroup: {{ .Values.cluster.securityContext.runAsGroup }}
    fsGroup: {{ .Values.cluster.securityContext.fsGroup }}
  redisLeader:
    replicas: {{ .Values.cluster.leader.replicas }}
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - "{{ .Values.cluster.name }}-leader"
            topologyKey: kubernetes.io/hostname
  redisFollower:
    replicas: {{ .Values.cluster.follower.replicas }}
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - "{{ .Values.cluster.name }}-follower"
            topologyKey: kubernetes.io/hostname
  storage:
    volumeClaimTemplate:
      spec:
        {{- if .Values.cluster.storageClassName }}
        storageClassName: {{ .Values.cluster.storageClassName }}
        {{- end }}
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.cluster.storage }}
{{- end }}
