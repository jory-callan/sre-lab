---
# 需要先部署 Prometheus Operator（kube-prometheus-stack）
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-cluster-monitor
  namespace: redis-operator
  labels:
    release: prometheus               # 与你的 Prometheus 实例 label 一致
spec:
  selector:
    matchLabels:
      redis_setup_type: cluster
  namespaceSelector:
    any: true
  endpoints:
  - port: redis-exporter
    interval: 15s
    path: /metrics
