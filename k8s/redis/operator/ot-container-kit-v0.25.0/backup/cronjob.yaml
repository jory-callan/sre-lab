---
# Redis RDB 备份 CronJob — v0.25.0
#
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
  namespace: redis-operator
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: redis-operator
          restartPolicy: OnFailure
          containers:
          - name: redis-backup
            image: redis:7
            command:
            - /bin/sh
            - -ec
            - |
              NAMESPACE="${NAMESPACE:-default}"
              BACKUP_DIR="/tmp/redis-backup"
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              CLI="redis-cli -p 6379 ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} --no-auth-warning"
              mkdir -p "$BACKUP_DIR"

              backup_single() {
                local name="$1" svc="${name}.${NAMESPACE}.svc"
                echo "[${TIMESTAMP}] → ${name}"
                ${CLI} -h "$svc" --rdb "${BACKUP_DIR}/${name}.rdb"
                [ -n "${S3_BUCKET}" ] && aws s3 cp "${BACKUP_DIR}/${name}.rdb" \
                  "s3://${S3_BUCKET}/redis/${name}/${TIMESTAMP}.rdb"
              }

              backup_cluster_leaders() {
                local name="$1"
                local replicas=$(kubectl get redisclusters.redis.redis.opstreelabs.in \
                  "$name" -n "$NAMESPACE" -o jsonpath='{.spec.clusterSize}')
                for i in $(seq 0 $((replicas - 1))); do
                  local pod="${name}-leader-${i}"
                  local svc="${pod}.${name}-leader-headless.${NAMESPACE}.svc"
                  ${CLI} -h "$svc" --rdb "${BACKUP_DIR}/${pod}.rdb"
                  [ -n "${S3_BUCKET}" ] && aws s3 cp "${BACKUP_DIR}/${pod}.rdb" \
                    "s3://${S3_BUCKET}/redis/${name}/${TIMESTAMP}-${pod}.rdb"
                done
              }

              backup_single "redis-standalone"
              # backup_cluster_leaders "redis-cluster"

              rm -rf "$BACKUP_DIR"
              echo "[${TIMESTAMP}] Done."
            env:
            - name: NAMESPACE
              value: "default"
            # - name: REDIS_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: redis-secret
            #       key: password
            # - name: S3_BUCKET
            #   value: my-redis-backup
            # - name: AWS_ACCESS_KEY_ID
            #   valueFrom:
            #     secretKeyRef:
            #       name: s3-credentials
            #       key: access-key
            # - name: AWS_SECRET_ACCESS_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: s3-credentials
            #       key: secret-key
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 256Mi
