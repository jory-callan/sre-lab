  name: {{ .Values.replication.name }}-monitor
  namespace: {{ include "redis-operator.namespace" . }}
  labels:
    release: {{ .Values.serviceMonitor.labels.release }}
spec:
  selector:
    matchLabels:
      redis_setup_type: replication
  namespaceSelector:
    any: true
  endpoints:
  - port: redis-exporter
    interval: 15s
    path: /metrics
{{- end }}
{{- if .Values.sentinel.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.sentinel.name }}-monitor
  namespace: {{ include "redis-operator.namespace" . }}
  labels:
    release: {{ .Values.serviceMonitor.labels.release }}
spec:
  selector:
    matchLabels:
      redis_setup_type: sentinel
  namespaceSelector:
    any: true
  endpoints:
  - port: redis-exporter
    interval: 15s
