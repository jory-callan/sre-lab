{{- if .Values.serviceMonitor.enabled }}
{{- if .Values.standalone.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.standalone.name }}-monitor
  namespace: {{ include "redis-operator.namespace" . }}
  labels:
    release: {{ .Values.serviceMonitor.labels.release }}
spec:
  selector:
    matchLabels:
      redis_setup_type: standalone
  namespaceSelector:
    any: true
  endpoints:
  - port: redis-exporter
    interval: 15s
    path: /metrics
{{- end }}
{{- if .Values.cluster.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.cluster.name }}-monitor
  namespace: {{ include "redis-operator.namespace" . }}
  labels:
    release: {{ .Values.serviceMonitor.labels.release }}
spec:
  selector:
    matchLabels:
      redis_setup_type: cluster
  namespaceSelector:
    any: true
  endpoints:
  - port: redis-exporter
    interval: 15s
    path: /metrics
{{- end }}
{{- if .Values.replication.enabled }}
