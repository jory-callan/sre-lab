{{- if .Values.standalone.enabled }}
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: {{ .Values.standalone.name }}
spec:
  podSecurityContext:
    runAsUser: {{ .Values.standalone.podSecurityContext.runAsUser }}
    fsGroup: {{ .Values.standalone.podSecurityContext.fsGroup }}
  kubernetesConfig:
    image: "{{ $.Values.redisImage.repository }}:{{ $.Values.redisImage.tag }}"
    imagePullPolicy: {{ $.Values.redisImage.pullPolicy }}
    resources:
      requests:
        cpu: {{ .Values.standalone.resources.requests.cpu }}
        memory: {{ .Values.standalone.resources.requests.memory }}
      limits:
        memory: {{ .Values.standalone.resources.limits.memory }}
    {{- if .Values.standalone.redisSecret }}
    redisSecret:
      name: {{ .Values.standalone.redisSecret.name }}
      key: {{ .Values.standalone.redisSecret.key }}
    {{- end }}
  redisExporter:
    enabled: {{ .Values.standalone.exporter.enabled }}
    image: "{{ $.Values.redisExporterImage.repository }}:{{ $.Values.redisExporterImage.tag }}"
    imagePullPolicy: {{ $.Values.redisExporterImage.pullPolicy }}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.standalone.storage }}
  pdb:
    enabled: {{ .Values.standalone.pdb.enabled }}
    minAvailable: {{ .Values.standalone.pdb.minAvailable }}
{{- end }}
