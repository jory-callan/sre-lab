---
# RedisSentinel CR — Sentinel 高可用
#
# 先创建 RedisReplication（redis-replication），再创建此 Sentinel。
# Sentinel 会自动监控 replication 的主从状态并触发故障切换。
#
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: redis-sentinel
spec:
  clusterSize: 3                          # Sentinel 节点数（奇数）
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  redisSentinelConfig:
    redisReplicationName: redis-replication   # 关联的主从 CR 名称
    # quorum: 2                               # 判定故障的 quorum（默认 N/2+1）
  kubernetesConfig:
    image: quay.io/opstree/redis-sentinel:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        memory: 512Mi
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  pdb:
    enabled: true
    minAvailable: 2
