---
# RedisCluster CR — 3 主 3 从，v0.25.0 生产配置
#
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: redis-cluster
spec:
  # ── 分片数（最小 3）──
  clusterSize: 3
  clusterVersion: v7
  persistenceEnabled: true

  # ── 安全层 ──
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000

  kubernetesConfig:
    image: quay.io/opstree/redis:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 1Gi

    # redisSecret:
    #   name: redis-cluster-secret
    #   key: password

  # ── 监控层 ──
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:latest
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

  # ── 主节点 ──
  redisLeader:
    replicas: 1
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - redis-cluster-leader
            topologyKey: kubernetes.io/hostname

  # ── 从节点 ──
  redisFollower:
    replicas: 1
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - redis-cluster-follower
            topologyKey: kubernetes.io/hostname

  # ── 存储层 ──
  storage:
    volumeClaimTemplate:
      spec:
        # storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
    nodeConfVolume: true
    nodeConfVolumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

  # ── 保护层 ──
  pdb:
    enabled: true
    minAvailable: 2
