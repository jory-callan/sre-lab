# CloudNativePG Operator values (v0.29.0 / app 1.30.0)
# Referenced by operators/cnpg-operator/kustomization.yaml

replicaCount: 1

image:
  repository: ghcr.io/cloudnative-pg/cloudnative-pg
  pullPolicy: IfNotPresent

config:
  data: {}
  # 全集群 watch — 所有 namespace 的 Cluster CR 均被管理
  clusterWide: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# CRD 由 Helm includeCRDs=true 自动安装，无需额外配置
crds:
  create: false

monitoring:
  podMonitorEnabled: false
  grafanaDashboard:
    create: false

# 默认监控查询，VMAgent 可直接关联 PostgreSQL 采集
monitoringQueriesConfigMap:
  create: true
