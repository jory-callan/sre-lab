# Redis Operator values (OT-Container-KIT v0.25.0)
# Referenced by operators/redis-operator/kustomization.yaml

redisOperator:
  imageName: quay.io/opstree/redis-operator
  imagePullPolicy: IfNotPresent

  # 监控指标
  metrics:
    enabled: true
    bindAddress: ":8080"

  # 当前不启用 webhook；如需可开启，但需要 cert-manager
  webhook: false

  rbac:
    scope: "cluster"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

replicas: 1
