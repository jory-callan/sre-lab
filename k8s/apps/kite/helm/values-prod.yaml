# Kite 自定义 values - 覆写 dev/prod 环境配置
# 启用持久化和 Ingress，适配 k3s local-path 存储和 ingress-nginx
# 在 install.sh helm 模式下通过 -f 加载此文件

# 镜像标签 - 覆盖 Chart.yaml appVersion，指定确切版本
image:
  tag: v0.12.3

# 部署策略 - 使用 Recreate 避免 PVC 挂载冲突
# 原因：SQLite + ReadWriteOnce PVC，RollingUpdate 会导致新 Pod pending
deploymentStrategy:
  type: Recreate

# 持久化配置
db:
  type: sqlite
  sqlite:
    persistence:
      pvc:
        enabled: true  # 启用 PVC 持久化
        storageClass: "local-path"  # k3s 默认 StorageClass
        accessModes:
          - ReadWriteOnce
        size: 1Gi  # 1GB 存储空间
      mountPath: /data  # 挂载路径

# Ingress 配置
ingress:
  enabled: true  # 启用 ingress
  className: "nginx"  # 使用 ingress-nginx
  hosts:
    - host: kite.czw-sre.internal  # 访问域名
      paths:
        - path: /
          pathType: Prefix

# Service 类型 - 常用工具暴露 NodePort，30001 起顺序分配
service:
  type: NodePort
  nodePort: 30001
