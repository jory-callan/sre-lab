apiVersion: v1
kind: Service
metadata:
  name: demo-go-tiny
  labels:
    app: demo-go-tiny
spec:
  # 服务类型
  # ClusterIP：默认，仅集群内访问
  # NodePort：在每个节点上暴露端口
  # LoadBalancer：需要配合 MetalLB 等使用
  type: ClusterIP

  # 选择器，匹配后端 Pod
  selector:
    app: demo-go-tiny

  # 端口配置
  ports:
  - protocol: TCP
    port: 80          # 服务暴露的端口
    targetPort: 8080  # 容器监听的端口
