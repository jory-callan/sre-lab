# operators namespace — Operator 控制器统一运行空间
# 由 infrastructure/namespaces/ 统一管理，所有 operator App 不重复创建
apiVersion: v1
kind: Namespace
metadata:
  name: operators
  labels:
    purpose: operator-control-plane
---
# 配额：防止 Operator 控制面资源泄漏
apiVersion: v1
kind: ResourceQuota
metadata:
  name: operators-quota
  namespace: operators
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 3Gi
    limits.cpu: "4"
    limits.memory: 6Gi
    persistentvolumeclaims: 10
