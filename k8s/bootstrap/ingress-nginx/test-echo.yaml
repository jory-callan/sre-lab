# test-echo.yaml — ingress-nginx 验证
# 部署: kubectl apply -f test-echo.yaml
# 测试: curl -H "Host: echo.czw-sre.internal" http://<INGRESS_IP>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
      - name: echo
        image: nginxdemos/hello:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: echo
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: echo
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-echo
spec:
  ingressClassName: nginx
  rules:
  - host: "echo.czw-sre.internal"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: echo
            port:
              number: 80
