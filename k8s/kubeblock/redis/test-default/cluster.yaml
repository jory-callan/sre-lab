apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: redis
  namespace: redis
spec:
  terminationPolicy: Delete
  clusterDef: redis
  topology: replication
  componentSpecs:
    - name: redis
      serviceVersion: "7.2.4"
      disableExporter: false
      replicas: 2
      systemAccounts:
        - name: default
          secretRef:
            name: redis-account
            namespace: redis
      resources:
        limits:
          memory: 512Mi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: "nfs-client"
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
    - name: redis-sentinel
      serviceVersion: "7.2.4"
      replicas: 3
      systemAccounts:
        - name: default
          secretRef:
            name: redis-account
            namespace: redis
      resources:
        limits:
          memory: 256Mi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: "nfs-client"
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
