# Restore — 从备份恢复 Redis 到新集群
# 用法：先查找可用备份，修改 backup-name 后 apply
# kubectl get backup -n redis
# kubectl apply -f restore.yaml -n <target-ns>
---
apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: redis-restore-demo
  namespace: demo
spec:
  restore:
    source:
      apiGroup: dataprotection.kubeblocks.io
      kind: Backup
      # 替换为实际的备份名称：kubectl get backup -n redis
      name: redis-redis-backup-datafile-202607200300
      namespace: redis
    parameters:
      dataprotection.kubeblocks.io/source-target-name: redis
      dataprotection.kubeblocks.io/volume-restore-policy: Parallel
  terminationPolicy: Delete
  clusterDef: redis
  topology: replication
  componentSpecs:
    - name: redis
      serviceVersion: "7.2.4"
      disableExporter: false
      replicas: 2
      systemAccounts:
        - name: default
          secretRef:
            name: redis-account
            namespace: redis
      resources:
        limits:
          memory: 512Mi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: "nfs-client"
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
    - name: redis-sentinel
      serviceVersion: "7.2.4"
      replicas: 3
      systemAccounts:
        - name: default
          secretRef:
            name: redis-account
            namespace: redis
      resources:
        limits:
          memory: 256Mi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: "nfs-client"
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
