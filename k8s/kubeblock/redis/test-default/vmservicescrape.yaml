# VMServiceScrape — Prometheus 兼容模式（基于 Service 发现）
# 与现有的 VMPodScrape（Pod 级）并存，提供 Service 级抓取
# 这是标准 Prometheus ServiceMonitor 在 VictoriaMetrics 中的等价模式
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: redis-service-scrape
  namespace: redis
  labels:
    app.kubernetes.io/instance: redis
    app.kubernetes.io/managed-by: kubeblocks
spec:
  jobLabel: app.kubernetes.io/managed-by
  endpoints:
    - port: http-metrics
      path: /metrics
      scheme: http
      interval: 20s
  namespaceSelector:
    matchNames:
      - redis
  selector:
    matchLabels:
      app.kubernetes.io/instance: redis
      apps.kubeblocks.io/component-name: redis
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: redis-sentinel-service-scrape
  namespace: redis
  labels:
    app.kubernetes.io/instance: redis
    app.kubernetes.io/managed-by: kubeblocks
spec:
  jobLabel: app.kubernetes.io/managed-by
  endpoints:
    - port: redis-sentinel
      path: /metrics
      scheme: http
      interval: 20s
  namespaceSelector:
    matchNames:
      - redis
  selector:
    matchLabels:
      app.kubernetes.io/instance: redis
      apps.kubeblocks.io/component-name: redis-sentinel
