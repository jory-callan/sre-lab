    description\": \"***System Memory***: Total Memory for the system.\\\\\\n***InnoDB\
    \ Buffer Pool Data***: InnoDB maintains a storage area called the buffer pool\
    \ for caching data and indexes in memory.\\\\\\n***TokuDB Cache Size***: Similar\
    \ in function to the InnoDB Buffer Pool,  TokuDB will allocate 50% of the installed\
    \ RAM for its own cache.\\\\\\n***Key Buffer Size***: Index blocks for MYISAM\
    \ tables are buffered and are shared by all threads. key_buffer_size is the size\
    \ of the buffer used for index blocks.\\\\\\n***Adaptive Hash Index Size***: When\
    \ InnoDB notices that some index values are being accessed very frequently, it\
    \ builds a hash index for them in memory on top of B-Tree indexes.\\\\\\n ***Query\
    \ Cache Size***: The query cache stores the text of a SELECT statement together\
    \ with the corresponding result that was sent to the client. The query cache has\
    \ huge scalability problems in that only one thread can do an operation in the\
    \ query cache at the same time.\\\\\\n***InnoDB Dictionary Size***: The data dictionary\
    \ is InnoDB \\u2018s internal catalog of tables. InnoDB stores the data dictionary\
    \ on disk, and loads entries into memory while the server is running.\\\\\\n***InnoDB\
    \ Log Buffer Size***: The MySQL InnoDB log buffer allows transactions to run without\
    \ having to write the log to disk before the transactions commit.\",\n      \"\
