    \ Query Cache Memory**\\n\\nThe query cache has huge scalability problems in that\
    \ only one thread can do an operation in the query cache at the same time. This\
    \ serialization is true not only for SELECTs, but also for INSERT/UPDATE/DELETE.\\\
    n\\nThis also means that the larger the `query_cache_size` is set to, the slower\
    \ those operations become. In concurrent environments, the MySQL Query Cache quickly\
    \ becomes a contention point, decreasing performance. MariaDB and AWS Aurora have\
    \ done work to try and eliminate the query cache contention in their flavors of\
    \ MySQL, while MySQL 8.0 has eliminated the query cache feature.\\n\\nThe recommended\
    \ settings for most environments is to set:\\n  ``query_cache_type=0``\\n  ``query_cache_size=0``\\\
    n\\nNote that while you can dynamically change these values, to completely remove\
