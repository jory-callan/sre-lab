# VMRule — ApeCloud MySQL 告警规则
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: mysql-alert-rules
  namespace: mysql
spec:
  groups:
    - name: MySQLExporter
      rules:
        # ======== 严重告警（Critical）========
        - alert: MySQLDown
          expr: mysql_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "MySQL 实例宕机"
            description: "MySQL 实例 {{ $labels.pod }} 已宕机超过 1 分钟（namespace: {{ $labels.namespace }}）"

        - alert: MySQLRaftQuorumLost
          expr: count by (app_kubernetes_io_instance) (mysql_global_status_wsrep_cluster_size) < 2
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "MySQL Raft quorum 丢失"
            description: "MySQL 集群存活节点少于 2 个，无法达成共识"

        - alert: MySQLReplicationLag
          expr: mysql_slave_status_seconds_behind_master > 30
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "MySQL 复制延迟过高"
            description: "MySQL 从库延迟 {{ $value }} 秒（instance: {{ $labels.pod }}）"

        # ======== 警告告警（Warning）========
        - alert: MySQLDiskSpaceLow
          expr: (mysql_global_status_innodb_data_file_reads + mysql_global_status_innodb_data_file_writes) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MySQL 磁盘空间不足"
            description: "请检查 MySQL 实例 {{ $labels.pod }} 的磁盘使用情况"

        - alert: MySQLTooManyConnections
          expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 > 80
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "MySQL 连接数过多（> 80%）"
            description: "当前连接数 {{ $value | printf \"%.2f\" }}%（instance: {{ $labels.pod }}）"

        - alert: MySQLSlowQueries
          expr: increase(mysql_global_status_slow_queries[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "MySQL 慢查询增多"
            description: "最近 5 分钟内产生了 {{ $value | printf \"%.2f\" }} 条慢查询（instance: {{ $labels.pod }}）"

        - alert: MySQLInnoDBLogFileFull
          expr: mysql_global_status_innodb_log_waits > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MySQL InnoDB 日志等待"
            description: "InnoDB 日志文件等待次数为 {{ $value }}（instance: {{ $labels.pod }}），可能需要增大日志文件大小"
