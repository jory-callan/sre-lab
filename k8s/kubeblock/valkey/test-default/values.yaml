# 配置模板
# ConfigMap: valkey-config-template (operators 命名空间)
# ParametersDefinition: valkey8-pd
# ConfigConstraint: valkey-replication-config
# 详见 config.md

resources:
  # ──────────────────────────────────────────
  # 生产推荐值:
  #   requests:
  #     cpu: 500m
  #     memory: 512Mi
  #   limits:
  #     cpu: 1000m
  #     memory: 1Gi
  # ──────────────────────────────────────────
  # 当前环境最低配置（仅 memory limits）:
  valkey:
    limits:
      memory: 512Mi
  sentinel:
    limits:
      memory: 256Mi
accounts:
  default:
    username: default
    password: valkey@czw123
    description: 默认用户（ACL 认证）
