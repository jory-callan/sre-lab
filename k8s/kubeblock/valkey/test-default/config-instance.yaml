# Valkey 实例配置 — test-default
# 编辑此文件后，执行以下命令更新 ConfigMap：
#   kubectl apply -f config-instance.yaml -n operators
#   kubectl -n valkey rollout restart statefulset valkey-valkey
#
# 注意：此 ConfigMap 由 valkey/test-default 实例管理，
# 如果其他 valkey 实例共用此模板，修改会影响到它们。
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-config-template
  labels:
    app.kubernetes.io/instance: valkey-test-default
    app.kubernetes.io/managed-by: kubeblock
data:
  valkey.conf: |
    # Valkey 默认配置 — test-default 实例
    # 按需修改后 apply 生效

    bind * -::*
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300
    daemonize no
    pidfile /var/run/valkey_6379.pid

    loglevel notice
    logfile "/data/running.log"

    databases 16
    always-show-logo no
    set-proc-title yes

    # 持久化
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    rdb-del-sync-files no
    dir /data

    # 复制
    replica-serve-stale-data yes
    replica-read-only yes
    repl-diskless-sync yes
    repl-diskless-sync-delay 5
    repl-diskless-load disabled
    repl-disable-tcp-nodelay no
    replica-priority 100

    # AOF
    appendonly yes
    appendfilename "appendonly.aof"
    appenddirname "appendonlydir"
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    aof-use-rdb-preamble yes

    # 慢查询
    slowlog-log-slower-than 10000
    slowlog-max-len 128

    # 数据结构
    hash-max-listpack-entries 128
    hash-max-listpack-value 64
    list-max-listpack-size -2
    set-max-intset-entries 512
    zset-max-listpack-entries 128
    zset-max-listpack-value 64

    # 懒释放
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes
    replica-lazy-flush yes

    # IO 多线程
    io-threads 4
    io-threads-do-reads yes

    # 主动碎片整理
    activedefrag yes
    active-defrag-ignore-bytes 100mb
    active-defrag-threshold-lower 10
    active-defrag-threshold-upper 100
    active-defrag-cycle-min 1
    active-defrag-cycle-max 25
    active-defrag-max-scan-fields 1000

    # 内存策略
    maxmemory-policy allkeys-lru
