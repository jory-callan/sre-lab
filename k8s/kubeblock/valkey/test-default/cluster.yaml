apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: valkey
  namespace: valkey
spec:
  terminationPolicy: Delete
  clusterDef: valkey
  topology: replication-8
  componentSpecs:
    - name: valkey
      serviceVersion: "8.1.8"
      disableExporter: false
      replicas: 2
      systemAccounts:
        - name: default
          secretRef:
            name: valkey-account
            namespace: valkey
      resources:
        limits:
          memory: 512Mi
      # Pod 跨节点均匀分布
      schedulingPolicy:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: valkey
                    apps.kubeblocks.io/component-name: valkey
                topologyKey: kubernetes.io/hostname
              weight: 100
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: valkey
                  apps.kubeblocks.io/component-name: valkey
              topologyKey: kubernetes.io/hostname
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: "nfs-client"
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
    - name: valkey-sentinel
      serviceVersion: "8.1.8"
      replicas: 3
      systemAccounts:
        - name: default
          secretRef:
            name: valkey-account
            namespace: valkey
      resources:
        limits:
          memory: 256Mi
      # Sentinel 3 副本尽可能跨节点分布
      # 注意：当前只有 2 个 agent 节点，3 个副本无法硬反亲和
      # 使用 preferred 软约束确保在可用节点上最大化分散
      schedulingPolicy:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: valkey
                    apps.kubeblocks.io/component-name: valkey-sentinel
                topologyKey: kubernetes.io/hostname
              weight: 100
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: "nfs-client"
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
