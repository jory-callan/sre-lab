apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
data:
  # 是否使用 X-Forwarded-* 头
  # true：从 X-Forwarded-For 获取真实客户端 IP
  use-forwarded-headers: "true"

  # 如何构建 X-Forwarded-For 头
  # true：将 remote_addr 追加到现有 X-Forwarded-For
  compute-full-forwarded-for: "true"

  # 使用哪个头获取真实 IP
  forwarded-for-header: "X-Forwarded-For"

  # 真实 IP 头配置
  real-ip-header: "X-Forwarded-For"

  # 是否递归解析 X-Forwarded-For
  # true：从 X-Forwarded-For 中提取最左边的真实 IP
  real-ip-recursive: "true"
