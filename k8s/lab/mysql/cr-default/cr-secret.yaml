# MySQL 认证 Secret（仅 cluster 模式使用）
# Percona Operator 会自动生成默认 Secret，此处预定义以便使用已知密码
apiVersion: v1
kind: Secret
metadata:
  name: mysql-cluster-secrets
  namespace: mysql
type: Opaque
stringData:
  root: "mysql@czw"
  xtrabackup: "mysql@czw"
  monitor: "mysql@czw"
  operator: "mysql@czw"
  replication: "mysql@czw"
