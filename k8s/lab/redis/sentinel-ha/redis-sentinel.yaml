# Redis Sentinel（HA 仲裁层）
# 3 个 Sentinel 监控 redis 主从复制
# Master 宕机时自动选举新主
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: redis-sentinel
  namespace: redis
  labels:
    app.kubernetes.io/name: redis-sentinel
spec:
  clusterSize: 3
  redisSentinelConfig:
    redisReplicationName: redis
  kubernetesConfig:
    image: quay.io/opstree/redis-sentinel:v7.0.15
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
