apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
    release: prometheus
spec:
  selector:
    matchLabels:
      app: minio
  namespaceSelector:
    matchNames:
      - minio
  endpoints:
    - port: http-minio
      interval: 30s
      path: /minio/v2/metrics/cluster
