---
# 简洁版Docker安装
- name: 检查Docker是否已安装
  shell: |
    if command -v docker &> /dev/null; then
      docker --version | cut -d' ' -f3 | tr -d ','
    else
      echo "not_installed"
    fi
  register: docker_check
  changed_when: false

- name: 显示当前状态
  debug:
    msg: "Docker已安装: {{ docker_check.stdout != 'not_installed' }}"

- name: 跳过已安装的主机
  meta: end_play
  when: docker_check.stdout != 'not_installed'

- name: 卸载旧版本Docker
  yum:
    name:
      - docker
      - docker-client
      - docker-client-latest
      - docker-common
      - docker-latest
      - docker-latest-logrotate
      - docker-logrotate
      - docker-engine
    state: absent
  ignore_errors: yes

- name: 安装依赖包
  yum:
    name:
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
    state: present

- name: 添加Docker仓库
  get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: '0644'

- name: 替换为国内镜像源（如果指定了镜像源）
  replace:
    path: /etc/yum.repos.d/docker-ce.repo
    regexp: 'https://download.docker.com'
    replace: "{{ docker_mirror }}"
  when: docker_mirror != "https://download.docker.com"

- name: 安装Docker
  yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: 配置Docker镜像加速器
  copy:
    content: |
      {
        "registry-mirrors": {{ docker_daemon_config.registry_mirrors | to_json }}
      }
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'

# - name: 配置Docker守护进程
#   template:
#     src: daemon.json.j2
#     dest: /etc/docker/daemon.json
#     owner: root
#     group: root
#     mode: '0644'
#   notify: restart docker

- name: 添加用户到docker组
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ docker_users }}"
  when: docker_users | length > 0

- name: 启动Docker服务
  systemd:
    name: docker
    state: started
    enabled: yes
    daemon_reload: yes

- name: 验证Docker安装
  command: docker run --rm hello-world
  register: docker_test
  changed_when: false
  ignore_errors: yes

- name: 显示安装结果
  debug:
    msg: |
      ✅ Docker安装成功！
      版本: {{ docker_check.stdout }}
      测试结果: {{ '通过' if docker_test is success else '失败' }}