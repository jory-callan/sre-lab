# 为所有主机设置以下变量
[all:vars]
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/deploy_key
timezone=Asia/Shanghai

# 定义所有服务器，后续可以直接使用第一列引用即可
[servers]
vm-001 ansible_host=192.168.0.254 ansible_hostname=vm-001 ansible_ssh_private_key_file=~/.ssh/local_server ansible_ssh_user=root ansible_ssh_port=22

[rocky9_servers]
vm-001

# Nginx代理服务器（可以有多个做LB）
[nginx]
vm-001

# 应用服务器
[app]
vm-001 

# 数据库服务器
[database]
vm-001

# 监控服务器
[monitoring]
vm-001
